name: Align header divider once

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/align-divider-once.yml"

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Align divider and remove this helper
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("index.html")
          text = path.read_text()
          old = '.sheetbar{position:relative;align-self:stretch;display:grid;grid-template-columns:minmax(0,1fr) auto auto;align-items:center;gap:4px;min-width:0;margin-left:5px;padding-left:12px}.sheetbar::before{content:"";position:absolute;left:2px;top:0;bottom:0;width:1px;border-radius:999px;background:rgba(255,255,255,.16)}'
          new = '.sheetbar{position:relative;display:grid;grid-template-columns:minmax(0,1fr) auto auto;align-items:center;gap:4px;min-width:0;margin-left:5px;padding-left:12px}.sheetbar::before{content:"";position:absolute;left:2px;top:50%;width:1px;height:clamp(28px,5.5vw,43px);transform:translateY(-50%);border-radius:999px;background:rgba(255,255,255,.16)}'
          if text.count(old) != 1:
              raise SystemExit(f"Expected divider CSS once, found {text.count(old)}")
          path.write_text(text.replace(old, new, 1))
          PY
          rm .github/workflows/align-divider-once.yml

      - name: Commit change
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Align task header divider"
          git push
