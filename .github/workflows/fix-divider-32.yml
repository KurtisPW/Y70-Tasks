name: Fix divider height

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/fix-divider-32.yml"

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set divider to sheet bubble height
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('index.html')
          text = path.read_text()
          old = 'height:clamp(28px,5.5vw,43px)'
          new = 'height:32px'
          if old not in text:
              raise SystemExit('Expected divider rule not found')
          path.write_text(text.replace(old, new, 1))
          PY
      - name: Commit fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Match divider to sheet bubble height"
          git push
