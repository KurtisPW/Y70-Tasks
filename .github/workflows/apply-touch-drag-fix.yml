name: Apply Nexus touch drag fix

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/apply-touch-drag-fix.yml"
      - ".github/patches/touch-drag-nexus.patch"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  apply-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply validated touch patch
        id: patch
        shell: bash
        run: |
          if git apply --check .github/patches/touch-drag-nexus.patch; then
            git apply .github/patches/touch-drag-nexus.patch
            echo "applied=true" >> "$GITHUB_OUTPUT"
          elif git apply --reverse --check .github/patches/touch-drag-nexus.patch; then
            echo "Patch is already applied."
            echo "applied=false" >> "$GITHUB_OUTPUT"
          else
            echo "Patch no longer applies cleanly to index.html."
            exit 1
          fi

      - name: Commit patched index
        if: steps.patch.outputs.applied == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Fix Nexus touch drag gesture"
          git push origin HEAD:main

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload patched site
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy patched site
        id: deployment
        uses: actions/deploy-pages@v5
