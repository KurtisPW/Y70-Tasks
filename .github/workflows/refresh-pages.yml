name: Refresh Pages

on:
  push:
    paths:
      - .github/workflows/refresh-pages.yml

permissions:
  contents: write
  pages: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Remove one-time workflow
        run: |
          rm .github/workflows/refresh-pages.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Remove one-time Pages refresh"
          git push
      - name: Request Pages build from current source
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh api --method POST "repos/${GITHUB_REPOSITORY}/pages/builds"
