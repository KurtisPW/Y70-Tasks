name: Add hardware keyboard and heading reorder

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/add-hardware-keyboard-heading-reorder.yml"

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update app
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          path = Path("index.html")
          text = path.read_text()

          def replace_once(old: str, new: str, label: str) -> None:
              global text
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{label}: expected 1 match, found {count}")
              text = text.replace(old, new, 1)

          replace_once(
              '.section{border:1px solid var(--line);border-radius:14px;background:rgba(17,21,29,.72);overflow:hidden}',
              '.section{border:1px solid var(--line);border-radius:14px;background:rgba(17,21,29,.72);overflow:hidden;transition:opacity 160ms ease,transform 160ms ease,border-color 160ms ease,box-shadow 160ms ease}.section.dragging{position:relative;z-index:6;opacity:.94;transform:scale(1.008);border-color:var(--accent);box-shadow:0 12px 30px rgba(0,0,0,.48),0 0 0 1px var(--accent-line)}',
              'heading drag styles',
          )
          replace_once(
              '.section-head{min-height:41px;display:flex;align-items:center;justify-content:space-between;gap:9px;padding:5px 6px 5px 11px;background:rgba(255,255,255,.025);border-bottom:1px solid var(--line)}',
              '.section-head{min-height:41px;display:flex;align-items:center;justify-content:space-between;gap:9px;padding:5px 6px 5px 11px;background:rgba(255,255,255,.025);border-bottom:1px solid var(--line);touch-action:none;user-select:none;-webkit-user-select:none}',
              'heading touch styles',
          )

          replace_once(
              '''function insert(value){
  const max=keyboardContext?.maxLength||180;
  if(keyboardContext?.type==="hex"){
    if(value==="#"&&draft.length===0){
      draft="#";
    }else if(/^[0-9a-f]$/i.test(value)&&[...draft].length<max){
      draft+=value.toUpperCase();
    }else{
      return;
    }
    renderDraft();
    return;
  }
  if([...draft].length>=max)return;
  draft+=/^[a-z]$/i.test(value)?(shift?value.toUpperCase():value.toLowerCase()):value;
  renderDraft();
  if(/^[a-z]$/i.test(value)&&shift){
    shift=false;
    renderKeyboard();
  }
}''',
              '''function insert(value,{preserveCase=false}={}){
  const max=keyboardContext?.maxLength||180;
  if(keyboardContext?.type==="hex"){
    if(value==="#"&&draft.length===0){
      draft="#";
    }else if(/^[0-9a-f]$/i.test(value)&&[...draft].length<max){
      draft+=value.toUpperCase();
    }else{
      return;
    }
    renderDraft();
    return;
  }
  if([...draft].length>=max)return;
  draft+=preserveCase?value:(/^[a-z]$/i.test(value)?(shift?value.toUpperCase():value.toLowerCase()):value);
  renderDraft();
  if(!preserveCase&&/^[a-z]$/i.test(value)&&shift){
    shift=false;
    renderKeyboard();
  }
}''',
              'hardware keyboard character handling',
          )
          replace_once(
              'keyboardHint.textContent=`Touch the keys to type · ${context.maxLength} characters maximum`;',
              'keyboardHint.textContent=`Touch the keys or use a physical keyboard · ${context.maxLength} characters maximum`;',
              'keyboard hint',
          )

          old_drag = '''function beginTaskDrag(){
  if(!dragState||dragState.scrolling)return;
  dragState.dragging=true;
  dragState.previousOverflowY=taskViewport.style.overflowY;
  taskViewport.style.overflowY="hidden";
  dragState.row.classList.add("dragging");
  document.body.classList.add("task-dragging");
  status("Drag to reorder · release to save");
}

function startTaskGesture(task,rowElement,{inputType,inputId,clientX,clientY}){
  if(reorderBusy||dragState)return false;
  dragState={
    task,
    row:rowElement,
    parent:rowElement.parentElement,
    inputType,
    inputId,
    startX:clientX,
    startY:clientY,
    startScrollTop:taskViewport.scrollTop,
    scrolling:false,
    dragging:false,
    previousOverflowY:"",
    timer:setTimeout(beginTaskDrag,430)
  };
  return true;
}

function moveTaskGesture(clientX,clientY){
  if(!dragState)return;
  const dx=clientX-dragState.startX;
  const dy=clientY-dragState.startY;

  if(!dragState.dragging){
    if(!dragState.scrolling&&Math.hypot(dx,dy)>10){
      clearTimeout(dragState.timer);
      dragState.scrolling=true;
    }
    if(dragState.scrolling){
      taskViewport.scrollTop=dragState.startScrollTop-dy;
    }
    return;
  }

  const siblings=[...dragState.parent.querySelectorAll(".task")].filter(row=>row!==dragState.row);
  const before=siblings.find(row=>{
    const rect=row.getBoundingClientRect();
    return clientY<rect.top+rect.height/2;
  });
  if(before)dragState.parent.insertBefore(dragState.row,before);
  else dragState.parent.append(dragState.row);

  const viewportRect=taskViewport.getBoundingClientRect();
  if(clientY<viewportRect.top+38)taskViewport.scrollTop-=12;
  else if(clientY>viewportRect.bottom-38)taskViewport.scrollTop+=12;
}

async function saveDraggedOrder(rowElement,parentElement){
  const orderedIds=[...parentElement.querySelectorAll(".task")].map(row=>row.dataset.taskId).filter(Boolean);
  rowElement.classList.remove("dragging");
  unlockTaskDragScroll();
  dragState=null;
  reorderBusy=true;
  const batch=writeBatch(db);
  orderedIds.forEach((id,index)=>{
    const item=items.find(candidate=>candidate.id===id);
    if(item)item.order=index*1000;
    batch.update(itemDocument(id),{order:index*1000});
  });
  render();
  try{
    await batch.commit();
    status("Task order saved");
  }catch(error){
    console.error("Could not save task order:",error);
    status("Could not save task order",true);
  }finally{
    reorderBusy=false;
    render();
  }
}

function finishTaskGesture(){
  if(!dragState)return;
  clearTimeout(dragState.timer);
  if(!dragState.dragging){
    dragState=null;
    return;
  }
  const {row,parent}=dragState;
  saveDraggedOrder(row,parent);
}'''

          new_drag = '''function beginTaskDrag(){
  if(!dragState||dragState.scrolling)return;
  dragState.dragging=true;
  dragState.previousOverflowY=taskViewport.style.overflowY;
  taskViewport.style.overflowY="hidden";
  dragState.row.classList.add("dragging");
  document.body.classList.add("task-dragging");
  status(dragState.kind==="heading"?"Drag heading to reorder · release to save":"Drag task to reorder · release to save");
}

function startTaskGesture(item,rowElement,{inputType,inputId,clientX,clientY,kind="task"}){
  if(reorderBusy||dragState)return false;
  dragState={
    item,
    kind,
    row:rowElement,
    parent:rowElement.parentElement,
    selector:kind==="heading"?".section[data-heading-id]":".task",
    dataKey:kind==="heading"?"headingId":"taskId",
    inputType,
    inputId,
    startX:clientX,
    startY:clientY,
    startScrollTop:taskViewport.scrollTop,
    scrolling:false,
    dragging:false,
    previousOverflowY:"",
    timer:setTimeout(beginTaskDrag,430)
  };
  return true;
}

function moveTaskGesture(clientX,clientY){
  if(!dragState)return;
  const dx=clientX-dragState.startX;
  const dy=clientY-dragState.startY;

  if(!dragState.dragging){
    if(!dragState.scrolling&&Math.hypot(dx,dy)>10){
      clearTimeout(dragState.timer);
      dragState.scrolling=true;
    }
    if(dragState.scrolling){
      taskViewport.scrollTop=dragState.startScrollTop-dy;
    }
    return;
  }

  const siblings=[...dragState.parent.querySelectorAll(dragState.selector)].filter(row=>row!==dragState.row);
  const before=siblings.find(row=>{
    const rect=row.getBoundingClientRect();
    return clientY<rect.top+rect.height/2;
  });
  if(before)dragState.parent.insertBefore(dragState.row,before);
  else dragState.parent.append(dragState.row);

  const viewportRect=taskViewport.getBoundingClientRect();
  if(clientY<viewportRect.top+38)taskViewport.scrollTop-=12;
  else if(clientY>viewportRect.bottom-38)taskViewport.scrollTop+=12;
}

async function saveDraggedOrder(rowElement,parentElement){
  const state=dragState;
  if(!state)return;
  const {kind,selector,dataKey}=state;
  const orderedIds=[...parentElement.querySelectorAll(selector)].map(row=>row.dataset[dataKey]).filter(Boolean);
  rowElement.classList.remove("dragging");
  unlockTaskDragScroll();
  dragState=null;
  reorderBusy=true;
  const batch=writeBatch(db);
  orderedIds.forEach((id,index)=>{
    const item=items.find(candidate=>candidate.id===id);
    if(item)item.order=index*1000;
    batch.update(itemDocument(id),{order:index*1000});
  });
  render();
  try{
    await batch.commit();
    status(kind==="heading"?"Heading order saved":"Task order saved");
  }catch(error){
    console.error(`Could not save ${kind} order:`,error);
    status(`Could not save ${kind} order`,true);
  }finally{
    reorderBusy=false;
    render();
  }
}

function finishTaskGesture(){
  if(!dragState)return;
  clearTimeout(dragState.timer);
  if(!dragState.dragging){
    dragState=null;
    return;
  }
  const {row,parent}=dragState;
  saveDraggedOrder(row,parent);
}'''
          replace_once(old_drag, new_drag, 'generic task and heading drag logic')

          replace_once(
              '''function onTaskMouseDown(event,task,rowElement){
  if(event.button!==0||event.target.closest("button"))return;
  if(startTaskGesture(task,rowElement,{inputType:"mouse",inputId:0,clientX:event.clientX,clientY:event.clientY})){
    event.preventDefault();
  }
}

function onDocumentTouchMove(event){''',
              '''function onTaskMouseDown(event,task,rowElement){
  if(event.button!==0||event.target.closest("button"))return;
  if(startTaskGesture(task,rowElement,{inputType:"mouse",inputId:0,clientX:event.clientX,clientY:event.clientY})){
    event.preventDefault();
  }
}

function onHeadingTouchStart(event,heading,sectionElement){
  if(event.target.closest(".section-title,.section-actions")||event.touches.length!==1)return;
  const touch=event.changedTouches[0];
  if(!touch)return;
  if(startTaskGesture(heading,sectionElement,{inputType:"touch",inputId:touch.identifier,clientX:touch.clientX,clientY:touch.clientY,kind:"heading"})){
    event.preventDefault();
  }
}

function onHeadingMouseDown(event,heading,sectionElement){
  if(event.button!==0||event.target.closest(".section-title,.section-actions"))return;
  if(startTaskGesture(heading,sectionElement,{inputType:"mouse",inputId:0,clientX:event.clientX,clientY:event.clientY,kind:"heading"})){
    event.preventDefault();
  }
}

function onDocumentTouchMove(event){''',
              'heading gesture entry points',
          )

          replace_once(
              '''  const section=document.createElement("section");
  section.className="section";
  const head=document.createElement("div");
  head.className="section-head";
  const title=document.createElement("h2");''',
              '''  const section=document.createElement("section");
  section.className="section";
  if(!general)section.dataset.headingId=heading.id;
  const head=document.createElement("div");
  head.className="section-head";
  if(!general){
    head.setAttribute("aria-label",`${heading.text}. Hold the empty heading bar to reorder.`);
    head.addEventListener("touchstart",event=>onHeadingTouchStart(event,heading,section),{passive:false});
    head.addEventListener("mousedown",event=>onHeadingMouseDown(event,heading,section));
  }
  const title=document.createElement("h2");''',
              'heading section drag binding',
          )

          replace_once(
              '''  else if(event.key==="Backspace"){event.preventDefault();backspace()}
  else if(event.key.length===1){event.preventDefault();insert(event.key)}''',
              '''  else if(event.key==="Backspace"){event.preventDefault();backspace()}
  else if(event.key.length===1&&!event.ctrlKey&&!event.metaKey&&!event.altKey){event.preventDefault();insert(event.key,{preserveCase:true})}''',
              'physical keyboard keydown',
          )

          path.write_text(text)

          module = re.search(r'<script type="module">\s*(.*?)\s*</script>', text, re.S)
          if not module:
              raise SystemExit("Could not extract module script")
          Path("/tmp/y70-app.mjs").write_text(module.group(1))
          PY

      - name: Validate JavaScript
        run: node --check /tmp/y70-app.mjs

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Support hardware caps and reorder headings"
          git push
