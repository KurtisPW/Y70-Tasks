name: Fix sandbox auth

on:
  push:
    paths:
      - .github/workflows/fix-sandbox-auth.yml

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch Firebase auth for Nexus sandbox
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("index.html")
          text = path.read_text()

          text = text.replace(
              "      browserLocalPersistence,\n      getAuth,\n      onAuthStateChanged,\n      setPersistence,",
              "      inMemoryPersistence,\n      initializeAuth,\n      onAuthStateChanged,",
          )
          text = text.replace(
              "    const auth = getAuth(firebaseApp);",
              "    const auth = initializeAuth(firebaseApp, {\n      persistence: inMemoryPersistence\n    });",
          )
          text = text.replace('    const LEGACY_STORAGE_KEY = "hyte-y70-tasks-v1";\n', "")
          text = text.replace(
              '      <p class="auth-copy">Sign in with the Firebase user you created. Your tasks will reload from the cloud after Nexus restarts.</p>',
              '      <p class="auth-copy">Sign in with the Firebase user you created. Your tasks live in Firestore and reload from the cloud. Nexus uses a restricted iframe, so you may need to sign in again after each restart.</p>',
          )
          text = text.replace(
              '        <p class="auth-message" id="authMessage">Checking saved sign-in…</p>',
              '        <p class="auth-message" id="authMessage">Sign in to load your cloud tasks.</p>',
          )

          migration_start = text.find("    async function migrateLegacyTasks(user) {")
          subscription_start = text.find("    function subscribeToTasks(user) {", migration_start)
          if migration_start != -1 and subscription_start != -1:
              text = text[:migration_start] + text[subscription_start:]

          text = text.replace("        await setPersistence(auth, browserLocalPersistence);\n", "")
          text = text.replace(
              '    setPersistence(auth, browserLocalPersistence).catch((error) => {\n      console.warn("Firebase auth persistence is unavailable in this browser:", error);\n    });\n\n',
              "",
          )
          text = text.replace("      await migrateLegacyTasks(user);\n", "")

          forbidden = ["browserLocalPersistence", "getAuth", "setPersistence", "localStorage", "migrateLegacyTasks"]
          remaining = [token for token in forbidden if token in text]
          if remaining:
              raise SystemExit(f"Sandbox-unsafe tokens remain: {remaining}")
          if "inMemoryPersistence" not in text or "initializeAuth" not in text:
              raise SystemExit("Firebase in-memory auth initialization was not applied")

          path.write_text(text)
          PY
      - name: Commit fix and remove one-time workflow
        run: |
          rm .github/workflows/fix-sandbox-auth.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix Firebase auth in Nexus sandbox"
          git push
