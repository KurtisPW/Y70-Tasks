name: Align header controls optically

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/align-header-optical.yml"

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Align sheet controls with Tasks text
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('index.html')
          text = path.read_text()
          old = '.sheetbar{position:relative;display:grid;grid-template-columns:minmax(0,1fr) auto auto;align-items:center;gap:4px;min-width:0;margin-left:5px;padding-left:12px}'
          new = '.sheetbar{position:relative;display:grid;grid-template-columns:minmax(0,1fr) auto auto;align-items:center;gap:4px;min-width:0;margin-left:5px;padding-left:12px;transform:translateY(2px)}'
          if old not in text:
              raise SystemExit('Expected sheetbar rule not found')
          path.write_text(text.replace(old, new, 1))
          PY
      - name: Commit alignment fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Optically align task sheet controls"
          git push
