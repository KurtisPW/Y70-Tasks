<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#090b10" />
  <title>Y70 Tasks</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #090b10;
      --panel: rgba(19, 23, 32, 0.92);
      --text: #f7f8fb;
      --muted: #959dac;
      --line: rgba(255, 255, 255, 0.10);
      --accent: #9bf00b;
      --accent-soft: rgba(155, 240, 11, 0.14);
      --danger: #ff6b7a;
      --shadow: 0 24px 70px rgba(0, 0, 0, 0.35);
      --radius: 28px;
    }

    * { box-sizing: border-box; }
    [hidden] { display: none !important; }

    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      min-height: 100dvh;
      overflow-x: hidden;
      background:
        radial-gradient(circle at 50% -8%, rgba(155, 240, 11, 0.13), transparent 28rem),
        linear-gradient(180deg, #0c1016 0%, var(--bg) 42%);
    }

    button, input { font: inherit; }

    button {
      border: 0;
      color: inherit;
      cursor: pointer;
      touch-action: manipulation;
    }

    .app {
      width: min(100%, 760px);
      min-height: 100dvh;
      margin: 0 auto;
      padding: clamp(28px, 5vh, 72px) clamp(20px, 5vw, 48px) 52px;
      display: flex;
      flex-direction: column;
      gap: 26px;
    }

    .header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 20px;
    }

    .eyebrow {
      margin: 0 0 8px;
      color: var(--accent);
      font-size: clamp(13px, 2.4vw, 17px);
      font-weight: 800;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(42px, 10vw, 82px);
      line-height: 0.96;
      letter-spacing: -0.055em;
    }

    .date {
      margin: 14px 0 0;
      color: var(--muted);
      font-size: clamp(16px, 3vw, 23px);
      line-height: 1.35;
    }

    .count-badge {
      min-width: 84px;
      padding: 16px 14px;
      border: 1px solid var(--line);
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.045);
      text-align: center;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
    }

    .count-badge strong {
      display: block;
      font-size: clamp(27px, 6vw, 45px);
      line-height: 1;
    }

    .count-badge span {
      display: block;
      margin-top: 7px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .composer {
      position: sticky;
      top: 16px;
      z-index: 4;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(15, 18, 25, 0.88);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    #taskInput {
      width: 100%;
      min-width: 0;
      height: clamp(66px, 10vw, 86px);
      padding: 0 22px;
      border: 0;
      outline: 0;
      border-radius: 20px;
      background: transparent;
      color: var(--text);
      font-size: clamp(21px, 4vw, 30px);
      cursor: pointer;
      caret-color: transparent;
    }

    #taskInput::placeholder { color: #6e7684; }

    .add-button {
      width: clamp(66px, 13vw, 88px);
      height: clamp(66px, 13vw, 88px);
      border-radius: 20px;
      background: var(--accent);
      color: #11150a;
      font-size: clamp(36px, 7vw, 54px);
      font-weight: 400;
      line-height: 1;
      box-shadow: 0 10px 30px rgba(155, 240, 11, 0.18);
    }

    .add-button:active { transform: scale(0.96); }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      color: var(--muted);
      font-size: clamp(15px, 2.7vw, 20px);
    }

    .toolbar button {
      padding: 12px 16px;
      border-radius: 14px;
      background: transparent;
      color: var(--muted);
      font-weight: 700;
    }

    .toolbar button:disabled { opacity: 0.35; cursor: default; }

    .task-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .task {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      align-items: center;
      gap: 17px;
      min-height: clamp(86px, 14vw, 116px);
      padding: 18px 16px 18px 20px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: var(--panel);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.025);
      transition: opacity 160ms ease, transform 160ms ease;
    }

    .task:active { transform: scale(0.992); }
    .task.done { opacity: 0.58; background: rgba(19, 23, 32, 0.66); }

    .check {
      position: relative;
      width: clamp(42px, 8vw, 58px);
      height: clamp(42px, 8vw, 58px);
      border: 2px solid #66707f;
      border-radius: 50%;
      background: transparent;
    }

    .task.done .check { border-color: var(--accent); background: var(--accent); }

    .task.done .check::after {
      content: "";
      position: absolute;
      left: 34%;
      top: 19%;
      width: 20%;
      height: 42%;
      border: solid #0f1309;
      border-width: 0 4px 4px 0;
      transform: rotate(45deg);
    }

    .task-text {
      min-width: 0;
      overflow-wrap: anywhere;
      font-size: clamp(21px, 4.2vw, 32px);
      font-weight: 650;
      line-height: 1.26;
      letter-spacing: -0.02em;
    }

    .task.done .task-text {
      color: #9ca3ad;
      text-decoration: line-through;
      text-decoration-thickness: 2px;
    }

    .delete {
      display: grid;
      place-items: center;
      width: clamp(48px, 9vw, 62px);
      height: clamp(48px, 9vw, 62px);
      border-radius: 18px;
      background: transparent;
      color: #77808f;
      font-size: clamp(25px, 5vw, 35px);
    }

    .delete:active { background: rgba(255, 107, 122, 0.12); color: var(--danger); }

    .empty {
      display: grid;
      place-items: center;
      min-height: 390px;
      padding: 44px 28px;
      border: 1px dashed rgba(255,255,255,0.14);
      border-radius: var(--radius);
      text-align: center;
      color: var(--muted);
    }

    .empty-icon {
      display: grid;
      place-items: center;
      width: 92px;
      height: 92px;
      margin: 0 auto 22px;
      border-radius: 30px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 48px;
    }

    .empty strong {
      display: block;
      margin-bottom: 9px;
      color: var(--text);
      font-size: clamp(26px, 5vw, 38px);
    }

    .empty p {
      max-width: 360px;
      margin: 0;
      font-size: clamp(17px, 3.2vw, 23px);
      line-height: 1.45;
    }

    .footer {
      margin-top: auto;
      padding-top: 22px;
      color: #5e6673;
      font-size: 13px;
      text-align: center;
    }

    .sync-status.error { color: var(--danger); }

    body.keyboard-open { overflow: hidden; }

    .keyboard-overlay {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 16px;
      background: rgba(2, 4, 8, 0.82);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    .keyboard-panel {
      width: min(100%, 760px);
      max-height: calc(100dvh - 32px);
      overflow-y: auto;
      padding: clamp(20px, 4vw, 32px);
      border: 1px solid var(--line);
      border-radius: 30px;
      background: rgba(15, 18, 25, 0.98);
      box-shadow: 0 30px 100px rgba(0, 0, 0, 0.62);
    }

    .keyboard-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    .keyboard-title {
      margin: 0;
      font-size: clamp(28px, 5vw, 42px);
      letter-spacing: -0.035em;
    }

    .keyboard-close {
      display: grid;
      place-items: center;
      width: clamp(54px, 9vw, 68px);
      height: clamp(54px, 9vw, 68px);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.06);
      color: var(--muted);
      font-size: clamp(28px, 5vw, 38px);
    }

    .draft-display {
      min-height: clamp(92px, 15vw, 132px);
      margin-bottom: 18px;
      padding: 20px 22px;
      border: 1px solid rgba(155, 240, 11, 0.28);
      border-radius: 22px;
      background: #0a0d12;
      color: var(--text);
      font-size: clamp(25px, 4.5vw, 34px);
      font-weight: 650;
      line-height: 1.3;
      overflow-wrap: anywhere;
    }

    .draft-display.empty { color: #6e7684; }

    .draft-caret {
      display: inline-block;
      width: 3px;
      height: 1em;
      margin-left: 3px;
      vertical-align: -0.12em;
      border-radius: 2px;
      background: var(--accent);
      animation: blink 900ms steps(1) infinite;
    }

    @keyframes blink { 50% { opacity: 0; } }

    .keyboard {
      display: flex;
      flex-direction: column;
      gap: clamp(7px, 1.4vw, 11px);
      user-select: none;
      -webkit-user-select: none;
    }

    .keyboard-row {
      display: flex;
      justify-content: center;
      gap: clamp(5px, 1.1vw, 9px);
    }

    .key {
      display: grid;
      place-items: center;
      flex: 1 1 0;
      min-width: 0;
      height: clamp(56px, 9.5vw, 76px);
      padding: 0 4px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: clamp(10px, 2vw, 16px);
      background: #252b36;
      color: var(--text);
      font-size: clamp(18px, 3.5vw, 27px);
      font-weight: 750;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05);
    }

    .key:active { transform: scale(0.94); background: #343c49; }
    .key-wide { flex: 1.55 1 0; }
    .key-space { flex: 4.2 1 0; color: var(--muted); font-size: clamp(15px, 2.7vw, 20px); }
    .key-action { flex: 2.2 1 0; background: var(--accent); color: #11150a; }
    .key-shift.active { background: var(--accent-soft); border-color: rgba(155, 240, 11, 0.45); color: var(--accent); }

    .keyboard-hint {
      margin: 16px 0 0;
      color: #687180;
      font-size: clamp(12px, 2.2vw, 16px);
      text-align: center;
    }

    @media (max-width: 430px) {
      .app { padding-inline: 14px; }
      .composer { gap: 8px; padding: 8px; border-radius: 22px; }
      #taskInput { padding-inline: 15px; }
      .task { gap: 13px; padding-left: 16px; }
      .toolbar { padding-inline: 4px; }
      .keyboard-overlay { padding: 8px; }
      .keyboard-panel { padding: 16px 12px 18px; border-radius: 24px; }
      .key { height: 58px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { scroll-behavior: auto !important; transition: none !important; }
    }
  </style>
</head>
<body>
  <main class="app" id="app">
    <header class="header">
      <div>
        <p class="eyebrow">Y70 Dashboard</p>
        <h1>Tasks</h1>
        <p class="date" id="dateLabel"></p>
      </div>
      <div class="count-badge" aria-label="Open task count">
        <strong id="openCount">0</strong>
        <span>open</span>
      </div>
    </header>

    <form class="composer" id="taskForm" autocomplete="off">
      <input
        id="taskInput"
        name="task"
        type="text"
        maxlength="180"
        placeholder="Add a task…"
        aria-label="Open touch keyboard to add a new task"
        inputmode="none"
        readonly
      />
      <button class="add-button" id="openKeyboardButton" type="button" aria-label="Open touch keyboard">+</button>
    </form>

    <div class="toolbar">
      <span id="progressLabel">Loading cloud tasks…</span>
      <button id="clearCompleted" type="button" disabled>Clear done</button>
    </div>

    <section aria-live="polite">
      <ul class="task-list" id="taskList"></ul>
      <div class="empty" id="emptyState" hidden>
        <div>
          <div class="empty-icon" aria-hidden="true">✓</div>
          <strong>You're all clear.</strong>
          <p>Add a task above. This list reloads from Firebase automatically.</p>
        </div>
      </div>
    </section>

    <footer class="footer">
      <span class="sync-status" id="syncStatus">Connecting to Firebase…</span>
    </footer>
  </main>

  <div class="keyboard-overlay" id="keyboardOverlay" role="dialog" aria-modal="true" aria-labelledby="keyboardTitle" hidden>
    <div class="keyboard-panel">
      <div class="keyboard-header">
        <h2 class="keyboard-title" id="keyboardTitle">New task</h2>
        <button class="keyboard-close" id="keyboardClose" type="button" aria-label="Close keyboard">×</button>
      </div>

      <div class="draft-display empty" id="draftDisplay" role="textbox" aria-label="New task text" aria-live="polite"></div>
      <div class="keyboard" id="touchKeyboard" aria-label="Touch keyboard"></div>
      <p class="keyboard-hint" id="keyboardHint">Touch the keys to type · 180 characters maximum</p>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
    import {
      collection,
      deleteDoc,
      doc,
      initializeFirestore,
      memoryLocalCache,
      onSnapshot,
      orderBy,
      query,
      setDoc,
      updateDoc,
      writeBatch
    } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBpEQjMvSPwkVbfUYP5KPxFl63SHT54E1E",
      authDomain: "hyte-fb587.firebaseapp.com",
      projectId: "hyte-fb587",
      storageBucket: "hyte-fb587.firebasestorage.app",
      messagingSenderId: "334285347441",
      appId: "1:334285347441:web:0563b6cdf1720be66659d0"
    };

    const firebaseApp = initializeApp(firebaseConfig);
    const db = initializeFirestore(firebaseApp, {
      localCache: memoryLocalCache()
    });

    const taskForm = document.getElementById("taskForm");
    const taskInput = document.getElementById("taskInput");
    const openKeyboardButton = document.getElementById("openKeyboardButton");
    const keyboardOverlay = document.getElementById("keyboardOverlay");
    const keyboardClose = document.getElementById("keyboardClose");
    const touchKeyboard = document.getElementById("touchKeyboard");
    const draftDisplay = document.getElementById("draftDisplay");
    const keyboardTitle = document.getElementById("keyboardTitle");
    const keyboardHint = document.getElementById("keyboardHint");
    const taskList = document.getElementById("taskList");
    const emptyState = document.getElementById("emptyState");
    const openCount = document.getElementById("openCount");
    const progressLabel = document.getElementById("progressLabel");
    const clearCompleted = document.getElementById("clearCompleted");
    const dateLabel = document.getElementById("dateLabel");
    const syncStatus = document.getElementById("syncStatus");

    let tasks = [];
    let tasksLoaded = false;
    let unsubscribeTasks = null;
    let draftText = "";
    let shiftOn = true;
    let keyboardMode = "letters";
    let keyboardBusy = false;

    function taskCollection() {
      return collection(db, "lists", "main", "tasks");
    }

    function taskDocument(id) {
      return doc(db, "lists", "main", "tasks", id);
    }

    function makeId() {
      if (window.crypto && typeof window.crypto.randomUUID === "function") {
        return window.crypto.randomUUID();
      }
      return `${Date.now()}-${Math.random().toString(16).slice(2)}`;
    }

    function isValidTask(task) {
      return task
        && typeof task.id === "string"
        && typeof task.text === "string"
        && typeof task.done === "boolean";
    }

    function setSyncStatus(message, isError = false) {
      syncStatus.textContent = message;
      syncStatus.classList.toggle("error", isError);
    }

    function makeKey(label, { key = null, action = null, className = "", ariaLabel = "" } = {}) {
      const button = document.createElement("button");
      button.type = "button";
      button.className = `key ${className}`.trim();
      button.textContent = label;
      if (key !== null) button.dataset.key = key;
      if (action) button.dataset.action = action;
      if (ariaLabel) button.setAttribute("aria-label", ariaLabel);
      return button;
    }

    function addKeyboardRow(keys) {
      const row = document.createElement("div");
      row.className = "keyboard-row";
      for (const key of keys) row.appendChild(key);
      touchKeyboard.appendChild(row);
    }

    function renderKeyboard() {
      touchKeyboard.replaceChildren();

      if (keyboardMode === "letters") {
        addKeyboardRow(Array.from("1234567890", (value) => makeKey(value, { key: value })));
        addKeyboardRow(Array.from("qwertyuiop", (value) => makeKey(shiftOn ? value.toUpperCase() : value, { key: value })));
        addKeyboardRow(Array.from("asdfghjkl", (value) => makeKey(shiftOn ? value.toUpperCase() : value, { key: value })));

        const shift = makeKey("⇧", {
          action: "shift",
          className: `key-wide key-shift${shiftOn ? " active" : ""}`,
          ariaLabel: "Shift"
        });
        shift.setAttribute("aria-pressed", String(shiftOn));
        const letters = Array.from("zxcvbnm", (value) => makeKey(shiftOn ? value.toUpperCase() : value, { key: value }));
        const backspace = makeKey("⌫", { action: "backspace", className: "key-wide", ariaLabel: "Backspace" });
        addKeyboardRow([shift, ...letters, backspace]);

        addKeyboardRow([
          makeKey("#+=", { action: "symbols", className: "key-wide", ariaLabel: "Show symbols" }),
          makeKey(".", { key: "." }),
          makeKey(",", { key: "," }),
          makeKey("Space", { key: " ", className: "key-space" }),
          makeKey("-", { key: "-" }),
          makeKey("Add", { action: "commit", className: "key-action" })
        ]);
      } else {
        const symbolRows = [
          ["!", "@", "#", "$", "%", "^", "&", "*", "(", ")"],
          ["-", "_", "+", "=", "/", "\\", ":", ";", "'", "\""],
          ["[", "]", "{", "}", "<", ">", ",", ".", "?", "`"]
        ];

        for (const symbols of symbolRows) {
          addKeyboardRow(symbols.map((value) => makeKey(value, { key: value })));
        }

        addKeyboardRow([
          makeKey("ABC", { action: "letters", className: "key-wide", ariaLabel: "Show letters" }),
          makeKey("Space", { key: " ", className: "key-space" }),
          makeKey("⌫", { action: "backspace", className: "key-wide", ariaLabel: "Backspace" }),
          makeKey("Add", { action: "commit", className: "key-action" })
        ]);
      }
    }

    function renderDraft() {
      draftDisplay.replaceChildren();
      const isEmpty = !draftText;
      draftDisplay.classList.toggle("empty", isEmpty);
      draftDisplay.append(document.createTextNode(isEmpty ? "Type your task…" : draftText));

      const caret = document.createElement("span");
      caret.className = "draft-caret";
      caret.setAttribute("aria-hidden", "true");
      draftDisplay.appendChild(caret);
    }

    function openTaskKeyboard() {
      draftText = "";
      shiftOn = true;
      keyboardMode = "letters";
      keyboardBusy = false;
      keyboardTitle.textContent = "New task";
      keyboardHint.textContent = "Touch the keys to type · 180 characters maximum";
      renderDraft();
      renderKeyboard();
      keyboardOverlay.hidden = false;
      document.body.classList.add("keyboard-open");
    }

    function closeKeyboard() {
      keyboardOverlay.hidden = true;
      document.body.classList.remove("keyboard-open");
      draftText = "";
      keyboardBusy = false;
      touchKeyboard.replaceChildren();
    }

    function insertKey(value) {
      if (Array.from(draftText).length >= 180) return;

      let nextValue = value;
      if (/^[a-z]$/i.test(value)) {
        nextValue = shiftOn ? value.toUpperCase() : value.toLowerCase();
      }

      draftText += nextValue;
      renderDraft();

      if (/^[a-z]$/i.test(value) && shiftOn) {
        shiftOn = false;
        renderKeyboard();
      }
    }

    function backspace() {
      if (!draftText) return;
      draftText = Array.from(draftText).slice(0, -1).join("");
      renderDraft();
    }

    async function commitKeyboard() {
      if (keyboardBusy) return;
      keyboardBusy = true;
      try {
        const saved = await addTask(draftText);
        if (saved) closeKeyboard();
      } finally {
        keyboardBusy = false;
      }
    }

    async function addTask(text) {
      const cleanText = text.trim();
      if (!cleanText) return false;

      setSyncStatus("Saving…");
      try {
        const id = makeId();
        await setDoc(taskDocument(id), {
          text: cleanText,
          done: false,
          createdAt: Date.now()
        });
        return true;
      } catch (error) {
        console.error("Could not add task:", error);
        setSyncStatus("Save failed — check Firestore rules", true);
        return false;
      }
    }

    async function toggleTask(task) {
      try {
        await updateDoc(taskDocument(task.id), { done: !task.done });
      } catch (error) {
        console.error("Could not update task:", error);
        setSyncStatus("Update failed — check Firestore rules", true);
      }
    }

    async function deleteTask(id) {
      try {
        await deleteDoc(taskDocument(id));
      } catch (error) {
        console.error("Could not delete task:", error);
        setSyncStatus("Delete failed — check Firestore rules", true);
      }
    }

    async function clearDoneTasks() {
      const doneTasks = tasks.filter((task) => task.done);
      if (!doneTasks.length) return;

      try {
        const batch = writeBatch(db);
        for (const task of doneTasks) batch.delete(taskDocument(task.id));
        await batch.commit();
      } catch (error) {
        console.error("Could not clear completed tasks:", error);
        setSyncStatus("Could not clear completed tasks", true);
      }
    }

    function subscribeToTasks() {
      if (unsubscribeTasks) unsubscribeTasks();
      setSyncStatus("Loading cloud tasks…");

      const taskQuery = query(taskCollection(), orderBy("createdAt", "desc"));
      unsubscribeTasks = onSnapshot(taskQuery, (snapshot) => {
        tasks = snapshot.docs.map((snapshotDoc) => ({
          id: snapshotDoc.id,
          ...snapshotDoc.data()
        })).filter(isValidTask);
        tasksLoaded = true;
        render();
        setSyncStatus("Cloud synced");
      }, (error) => {
        console.error("Could not sync tasks:", error);
        tasks = [];
        tasksLoaded = false;
        render();
        setSyncStatus("Sync blocked — update Firestore rules", true);
        progressLabel.textContent = "Could not load cloud tasks";
      });
    }

    function render() {
      taskList.replaceChildren();

      for (const task of tasks) {
        const item = document.createElement("li");
        item.className = `task${task.done ? " done" : ""}`;
        item.dataset.id = task.id;

        const checkButton = document.createElement("button");
        checkButton.type = "button";
        checkButton.className = "check";
        checkButton.setAttribute("aria-label", task.done ? `Mark ${task.text} as not done` : `Mark ${task.text} as done`);
        checkButton.setAttribute("aria-pressed", String(task.done));
        checkButton.addEventListener("click", () => toggleTask(task));

        const text = document.createElement("span");
        text.className = "task-text";
        text.textContent = task.text;

        const deleteButton = document.createElement("button");
        deleteButton.type = "button";
        deleteButton.className = "delete";
        deleteButton.textContent = "×";
        deleteButton.setAttribute("aria-label", `Delete ${task.text}`);
        deleteButton.addEventListener("click", () => deleteTask(task.id));

        item.append(checkButton, text, deleteButton);
        taskList.appendChild(item);
      }

      const done = tasks.filter((task) => task.done).length;
      const open = tasks.length - done;
      openCount.textContent = String(open);
      emptyState.hidden = !tasksLoaded || tasks.length > 0;
      clearCompleted.disabled = done === 0;

      if (!tasksLoaded) {
        progressLabel.textContent = "Loading cloud tasks…";
      } else if (tasks.length === 0) {
        progressLabel.textContent = "Nothing to do";
      } else if (open === 0) {
        progressLabel.textContent = "All tasks complete";
      } else if (done === 0) {
        progressLabel.textContent = `${open} ${open === 1 ? "task" : "tasks"} to go`;
      } else {
        progressLabel.textContent = `${done} of ${tasks.length} complete`;
      }
    }

    touchKeyboard.addEventListener("click", (event) => {
      const key = event.target.closest("button[data-key], button[data-action]");
      if (!key) return;

      const action = key.dataset.action;
      if (action === "shift") {
        shiftOn = !shiftOn;
        renderKeyboard();
      } else if (action === "backspace") {
        backspace();
      } else if (action === "symbols") {
        keyboardMode = "symbols";
        renderKeyboard();
      } else if (action === "letters") {
        keyboardMode = "letters";
        renderKeyboard();
      } else if (action === "commit") {
        commitKeyboard();
      } else if (key.dataset.key !== undefined) {
        insertKey(key.dataset.key);
      }
    });

    document.addEventListener("keydown", (event) => {
      if (keyboardOverlay.hidden) return;

      if (event.key === "Escape") {
        closeKeyboard();
      } else if (event.key === "Enter") {
        event.preventDefault();
        commitKeyboard();
      } else if (event.key === "Backspace") {
        event.preventDefault();
        backspace();
      } else if (event.key.length === 1) {
        event.preventDefault();
        insertKey(event.key);
      }
    });

    taskForm.addEventListener("submit", (event) => {
      event.preventDefault();
      openTaskKeyboard();
    });
    taskInput.addEventListener("click", openTaskKeyboard);
    taskInput.addEventListener("focus", () => taskInput.blur());
    openKeyboardButton.addEventListener("click", openTaskKeyboard);
    keyboardClose.addEventListener("click", closeKeyboard);
    keyboardOverlay.addEventListener("click", (event) => {
      if (event.target === keyboardOverlay) closeKeyboard();
    });
    clearCompleted.addEventListener("click", clearDoneTasks);

    dateLabel.textContent = new Intl.DateTimeFormat(undefined, {
      weekday: "long",
      day: "numeric",
      month: "long"
    }).format(new Date());

    render();
    subscribeToTasks();
  </script>
</body>
</html>
