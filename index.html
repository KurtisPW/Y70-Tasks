<!doctype html>
<html lang="en">
<head>

<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">

<title>Y70 Tasks</title>
<style>
:root{color-scheme:dark;--bg:#090b10;--panel:rgba(19,23,32,.94);--text:#f7f8fb;--muted:#959dac;--line:rgba(255,255,255,.1);--accent:#ca3229;--accent-soft:rgba(202,50,41,.16);--accent-glow:rgba(202,50,41,.16);--accent-shadow:rgba(202,50,41,.24);--accent-line:rgba(202,50,41,.38);--picker-hue:#ff0000;--danger:#ff6b7a}
*{box-sizing:border-box}[hidden]{display:none!important}
html,body{margin:0;height:100%;background:var(--bg);color:var(--text);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;-webkit-tap-highlight-color:transparent}
body{min-height:100dvh;overflow:hidden;background:radial-gradient(circle at 50% -8%,var(--accent-glow),transparent 24rem),linear-gradient(180deg,#0c1016 0%,var(--bg) 42%)}
button,input{font:inherit}button{border:0;color:inherit;cursor:pointer;touch-action:manipulation}
.app{width:min(100%,760px);height:100dvh;margin:0 auto;padding:clamp(9px,1.4vh,18px) clamp(10px,2.2vw,22px) 9px;display:flex;flex-direction:column;gap:7px;overflow:hidden}
.eyebrow{align-self:center;margin:0;padding:0;background:transparent;color:var(--accent);font-size:clamp(10px,1.7vw,13px);font-weight:850;letter-spacing:.13em;text-transform:uppercase;text-align:center;flex:0 0 auto}
.sheetbar{position:relative;align-self:stretch;display:grid;grid-template-columns:minmax(0,1fr) auto auto;align-items:center;gap:4px;min-width:0;margin-left:5px;padding-left:12px}.sheetbar::before{content:"";position:absolute;left:2px;top:0;bottom:0;width:1px;border-radius:999px;background:rgba(255,255,255,.16)}
.sheet-tabs{display:flex;align-items:center;gap:5px;min-width:0;overflow-x:auto;scrollbar-width:none;overscroll-behavior-x:contain}
.sheet-tabs::-webkit-scrollbar{display:none}
.sheet-tab{flex:0 0 auto;max-width:150px;height:32px;padding:0 10px;border:1px solid var(--line);border-radius:9px;background:rgba(255,255,255,.045);color:var(--muted);font-size:clamp(10px,1.8vw,13px);font-weight:750;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;user-select:none;-webkit-user-select:none}
.sheet-tab.active{background:var(--accent);border-color:var(--accent);color:#fff}
.sheet-control{display:grid;place-items:center;width:32px;height:32px;border-radius:9px;background:rgba(255,255,255,.06);color:var(--muted);font-size:20px;font-weight:700}
.sheet-control.add-sheet{background:var(--accent);color:#fff}.sheet-control:disabled{opacity:.3;cursor:default}
.header{display:grid;grid-template-columns:auto minmax(0,1fr) auto;align-items:center;gap:7px;flex:0 0 auto}
h1{margin:0;font-size:clamp(28px,5.6vw,44px);line-height:.98;letter-spacing:-.05em}

#headingInput{width:100%;min-width:0;height:clamp(44px,6.6vw,55px);padding:0 12px;border:0;outline:0;border-radius:11px;background:transparent;color:var(--text);font-size:clamp(15px,2.7vw,21px);cursor:pointer;caret-color:transparent}

.add{width:clamp(44px,6.6vw,55px);height:clamp(44px,6.6vw,55px);border-radius:11px;background:var(--accent);color:#fff;font-size:clamp(25px,4.2vw,34px);font-weight:500;line-height:1;box-shadow:0 8px 24px var(--accent-shadow)}
.add:active,.section-add:active,.section-delete:active,.sheet-control:active:not(:disabled){transform:scale(.94)}
.toolbar{display:flex;align-items:center;justify-content:space-between;gap:10px;color:var(--muted);font-size:clamp(11px,1.9vw,14px);flex:0 0 auto}
.toolbar button{padding:6px 8px;border-radius:9px;background:transparent;color:var(--muted);font-weight:700}
.toolbar button:disabled{opacity:.35;cursor:default}
.viewport{flex:1 1 auto;min-height:0;overflow-y:auto;overscroll-behavior:contain;scrollbar-width:thin;padding-right:3px}
.viewport.empty-mode{overflow-y:hidden;padding-right:0}
.sections{display:flex;flex-direction:column;gap:8px;padding-bottom:4px}
.section{border:1px solid var(--line);border-radius:14px;background:rgba(17,21,29,.72);overflow:hidden}
.section-head{min-height:41px;display:flex;align-items:center;justify-content:space-between;gap:9px;padding:5px 6px 5px 11px;background:rgba(255,255,255,.025);border-bottom:1px solid var(--line)}
.section-title{min-width:0;margin:0;font-size:clamp(16px,3vw,22px);line-height:1.1;letter-spacing:-.025em;overflow-wrap:anywhere;user-select:none;-webkit-user-select:none}
.section-actions{display:flex;align-items:center;gap:4px;flex:0 0 auto}
.section-meta{min-width:22px;color:var(--muted);font-size:10px;font-weight:800;text-align:center}

.delete{display:grid;place-items:center;width:29px;height:29px;border-radius:9px;background:transparent;color:#77808f;font-size:21px}

.section-empty{margin:0;padding:9px 11px 10px;color:#69717e;font-size:11px;text-align:center}

.empty-icon{display:grid;place-items:center;width:58px;height:58px;margin:0 auto 11px;border-radius:18px;background:var(--accent-soft);color:var(--accent);font-size:31px}

.footer{flex:0 0 auto;padding-top:1px;color:#5e6673;font-size:10px;text-align:center}.sync.error{color:var(--danger)}
body.keyboard-open{overflow:hidden}
.keyboard-overlay{position:fixed;inset:0;z-index:70;display:flex;align-items:flex-end;justify-content:center;padding:16px;background:rgba(2,4,8,.82);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)}

.keyboard-head{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:18px}.keyboard-head h2{margin:0;font-size:clamp(28px,5vw,42px);letter-spacing:-.035em}

.draft.draft-empty{color:#6e7684}
.caret{display:inline-block;width:3px;height:1em;margin-left:3px;vertical-align:-.12em;border-radius:2px;background:var(--accent);animation:blink 900ms steps(1) infinite}
@keyframes blink{50%{opacity:0}}
.keyboard{display:flex;flex-direction:column;gap:clamp(7px,1.4vw,11px);user-select:none;-webkit-user-select:none}.key-row{display:flex;justify-content:center;gap:clamp(5px,1.1vw,9px)}
.key{display:grid;place-items:center;flex:1 1 0;min-width:0;height:clamp(56px,9.5vw,76px);padding:0 4px;border:1px solid rgba(255,255,255,.08);border-radius:clamp(10px,2vw,16px);background:#252b36;color:var(--text);font-size:clamp(18px,3.5vw,27px);font-weight:750}
.key:active{transform:scale(.94);background:#343c49}.key-wide{flex:1.55 1 0}.key-space{flex:4.2 1 0;color:var(--muted);font-size:clamp(15px,2.7vw,20px)}.key-action{flex:2.2 1 0;background:var(--accent);color:#fff}.key-shift.active{background:var(--accent-soft);border-color:var(--accent-line);color:var(--accent)}
.keyboard-hint{margin:16px 0 0;color:#687180;font-size:clamp(12px,2.2vw,16px);text-align:center}

.theme-overlay{position:fixed;inset:0;z-index:60;display:flex;align-items:flex-end;justify-content:center;padding:14px;background:rgba(2,4,8,.82);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)}
.theme-panel{width:min(100%,760px);max-height:calc(100dvh - 28px);overflow-y:auto;padding:clamp(18px,3.5vw,28px);border:1px solid var(--line);border-radius:28px;background:rgba(15,18,25,.985);box-shadow:0 30px 100px rgba(0,0,0,.62)}
.theme-head{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:14px}.theme-head h2{margin:0;font-size:clamp(25px,4.6vw,38px);letter-spacing:-.035em}
.color-area{position:relative;width:100%;height:clamp(170px,30vw,245px);border:1px solid var(--line);border-radius:20px;background:linear-gradient(to top,#000,transparent),linear-gradient(to right,#fff,var(--picker-hue));overflow:hidden;touch-action:none}
.color-cursor{position:absolute;width:28px;height:28px;border:3px solid #fff;border-radius:50%;box-shadow:0 2px 8px rgba(0,0,0,.55);transform:translate(-50%,-50%);pointer-events:none}
.hue-slider{width:100%;height:30px;margin:14px 0 12px;padding:0;border:0;border-radius:999px;background:linear-gradient(90deg,#f00,#ff0,#0f0,#0ff,#00f,#f0f,#f00);appearance:none;-webkit-appearance:none;touch-action:none}
.hue-slider::-webkit-slider-runnable-track{height:30px;border-radius:999px;background:transparent}.hue-slider::-webkit-slider-thumb{width:26px;height:34px;margin-top:-2px;border:3px solid #fff;border-radius:10px;background:transparent;box-shadow:0 2px 8px rgba(0,0,0,.55);appearance:none;-webkit-appearance:none}
.hue-slider::-moz-range-track{height:30px;border-radius:999px;background:transparent}.hue-slider::-moz-range-thumb{width:22px;height:30px;border:3px solid #fff;border-radius:10px;background:transparent}
.color-meta{display:grid;grid-template-columns:auto minmax(0,1fr);align-items:center;gap:10px}.color-preview{width:46px;height:46px;border:2px solid rgba(255,255,255,.72);border-radius:14px;background:var(--accent)}
.hex-value{height:46px;padding:0 16px;border:1px solid var(--line);border-radius:14px;background:rgba(255,255,255,.055);color:var(--text);font-size:clamp(18px,3.5vw,27px);font-weight:750;letter-spacing:.06em;text-align:left}
.recent-row{display:grid;grid-template-columns:auto minmax(0,1fr);align-items:center;gap:10px;margin-top:14px;color:var(--muted);font-size:12px;font-weight:750;text-transform:uppercase;letter-spacing:.08em}.recent-colors{display:flex;gap:8px;min-height:38px}.recent-color{width:38px;height:38px;border:2px solid rgba(255,255,255,.34);border-radius:12px;box-shadow:inset 0 0 0 1px rgba(0,0,0,.22)}.recent-empty{align-self:center;color:#646c79;font-size:11px;text-transform:none;letter-spacing:0}
.theme-actions{display:grid;grid-template-columns:1fr 1.35fr;gap:9px;margin-top:16px}.theme-action{height:48px;border-radius:14px;background:rgba(255,255,255,.06);font-weight:800}.theme-action.save{background:var(--accent);color:#fff}

@media(max-width:430px){.app{padding-inline:8px}.header{gap:5px}h1{font-size:28px}.sheetbar{margin-left:2px;padding-left:9px}.sheetbar::before{left:1px}.sheet-tab{max-width:112px;padding-inline:8px}.keyboard-overlay{padding:8px}.keyboard-panel{padding:16px 12px 18px;border-radius:24px}.key{height:58px}.section-head{padding-left:9px}.tasks{padding:4px}.task{padding-left:7px}}
@media(prefers-reduced-motion:reduce){*,*:before,*:after{transition:none!important;animation:none!important}}
</style>

<body>
<main class="app">
  <button class="eyebrow" id="themeButton" type="button" aria-label="Change accent colour">Y70 Virtual List</button>
  <header class="header">
    <h1>Tasks</h1>
    <div class="sheetbar">
      <div class="sheet-tabs" id="sheetTabs" aria-label="Task sheets"></div>
      <button class="sheet-control add-sheet" id="addSheetButton" type="button" aria-label="Create new task sheet">+</button>
      <button class="sheet-control" id="deleteSheetButton" type="button" aria-label="Delete current task sheet">×</button>
    </div>
    <div class="count" aria-label="Open task count"><strong id="openCount">0</strong><span>open</span></div>
  </header>
  <form class="composer" id="headingForm" autocomplete="off">
    <input id="headingInput" type="text" maxlength="80" placeholder="Add a heading…" aria-label="Open touch keyboard to add a heading" inputmode="none" readonly>
    <button class="add" id="openHeadingKeyboard" type="button" aria-label="Add heading">+</button>
  </form>
  <div class="toolbar"><span id="progressLabel">Loading cloud tasks…</span><button id="clearCompleted" type="button" disabled>Clear done</button></div>
  <section class="viewport" id="taskViewport" aria-live="polite">
    <div class="sections" id="sections"></div>
    <div class="empty" id="emptyState" hidden><div><div class="empty-icon" aria-hidden="true">✓</div><strong>No headings yet.</strong><p>Add a heading above, then use its red + button to add subtasks.</p></div></div>
  </section>
  <footer class="footer"><span class="sync" id="syncStatus">Connecting to Firebase…</span></footer>
</main>
<div class="keyboard-overlay" id="keyboardOverlay" role="dialog" aria-modal="true" aria-labelledby="keyboardTitle" hidden>
  <div class="keyboard-panel">
    <div class="keyboard-head"><h2 id="keyboardTitle">New heading</h2><button class="close" id="keyboardClose" type="button" aria-label="Close keyboard">×</button></div>
    <div class="draft draft-empty" id="draftDisplay" role="textbox" aria-label="Typed text" aria-live="polite"></div>
    <div class="keyboard" id="touchKeyboard" aria-label="Touch keyboard"></div>
    <p class="keyboard-hint" id="keyboardHint">Touch the keys to type</p>
  </div>
</div>

<div class="theme-overlay" id="themeOverlay" role="dialog" aria-modal="true" aria-labelledby="themeTitle" hidden>
  <div class="theme-panel">
    <div class="theme-head"><h2 id="themeTitle">Accent colour</h2><button class="close" id="themeClose" type="button" aria-label="Close colour picker">×</button></div>
    <div class="color-area" id="colorArea" aria-label="Colour saturation and brightness picker"><span class="color-cursor" id="colorCursor" aria-hidden="true"></span></div>
    <input class="hue-slider" id="hueSlider" type="range" min="0" max="360" step="1" value="0" aria-label="Colour hue">
    <div class="color-meta">
      <span class="color-preview" id="colorPreview" aria-hidden="true"></span>
      <button class="hex-value" id="hexValue" type="button" aria-label="Enter a hexadecimal colour value">#CA3229</button>
    </div>
    <div class="recent-row"><span>Recent</span><div class="recent-colors" id="recentColors"></div></div>
    <div class="theme-actions">
      <button class="theme-action" id="themeCancel" type="button">Cancel</button>
      <button class="theme-action save" id="themeSave" type="button">Save colour</button>
    </div>
  </div>
</div>
<script type="module">

const normalizeHex=value=>{
  const raw=String(value||"").trim().replace(/^#/,"");

  return {h,s:max===0?0:delta/max,v:max};
};
const hsvToRgb=(h,s,v)=>{
  const c=v*s,x=c*(1-Math.abs((h/60)%2-1)),m=v-c;
  let r=0,g=0,b=0;
  if(h<60){r=c;g=x}else if(h<120){r=x;g=c}else if(h<180){g=c;b=x}else if(h<240){g=x;b=c}else if(h<300){r=x;b=c}else{r=c;b=x}
  return {r:(r+m)*255,g:(g+m)*255,b:(b+m)*255};
};
function setAccent(hex){
  const clean=normalizeHex(hex)||"#CA3229";
  const rgb=hexToRgb(clean);
  const root=document.documentElement.style;

  root.setProperty("--accent-glow",`rgba(${rgb.r},${rgb.g},${rgb.b},.16)`);
  root.setProperty("--accent-shadow",`rgba(${rgb.r},${rgb.g},${rgb.b},.24)`);
  root.setProperty("--accent-line",`rgba(${rgb.r},${rgb.g},${rgb.b},.38)`);
}

function syncPickerFromHex(hex){

function renderKeyboard(){
  touchKeyboard.replaceChildren();
  if(mode==="hex"){
    row([..."1234567890"].map(value=>key(value,{value})));
    row([..."ABCDEF"].map(value=>key(value,{value})));
    row([key("#",{value:"#",className:"key-wide"}),key("⌫",{action:"backspace",className:"key-wide",aria:"Backspace"}),key(keyboardContext?.actionLabel||"Use",{action:"commit",className:"key-action"})]);
  }else if(mode==="letters"){
    row([..."1234567890"].map(value=>key(value,{value})));
    row([..."qwertyuiop"].map(value=>key(shift?value.toUpperCase():value,{value})));
    row([..."asdfghjkl"].map(value=>key(shift?value.toUpperCase():value,{value})));
    const shiftKey=key("⇧",{action:"shift",className:`key-wide key-shift${shift?" active":""}`,aria:"Shift"});
    shiftKey.setAttribute("aria-pressed",String(shift));
    row([shiftKey,...[..."zxcvbnm"].map(value=>key(shift?value.toUpperCase():value,{value})),key("⌫",{action:"backspace",className:"key-wide",aria:"Backspace"})]);
    row([key("#+=",{action:"symbols",className:"key-wide",aria:"Show symbols"}),key(".",{value:"."}),key(",",{value:","}),key("Space",{value:" ",className:"key-space"}),key("-",{value:"-"}),key(keyboardContext?.actionLabel||"Add",{action:"commit",className:"key-action"})]);
  }else{
    for(const symbols of [["!","@","#","$","%","^","&","*","(",")"],["-","_","+","=","/","\\",":",";","'",'"'],["[","]","{","}","<",">",",",".","?","`"]]){
      row(symbols.map(value=>key(value,{value})));
    }
    row([key("ABC",{action:"letters",className:"key-wide",aria:"Show letters"}),key("Space",{value:" ",className:"key-space"}),key("⌫",{action:"backspace",className:"key-wide",aria:"Backspace"}),key(keyboardContext?.actionLabel||"Add",{action:"commit",className:"key-action"})]);
  }
}

function renderDraft(){
  draftDisplay.replaceChildren();

function insert(value){
  const max=keyboardContext?.maxLength||180;
  if(keyboardContext?.type==="hex"){
    if(value==="#"&&draft.length===0){
      draft="#";
    }else if(/^[0-9a-f]$/i.test(value)&&[...draft].length<max){
      draft+=value.toUpperCase();
    }else{
      return;
    }
    renderDraft();
    return;
  }
  if([...draft].length>=max)return;
  draft+=/^[a-z]$/i.test(value)?(shift?value.toUpperCase():value.toLowerCase()):value;
  renderDraft();
  if(/^[a-z]$/i.test(value)&&shift){
    shift=false;
    renderKeyboard();
  }
}

function backspace(){
  if(!draft)return;
  draft=[...draft].slice(0,-1).join("");
  renderDraft();
}

async function bootstrapFirstSheet(rawItems){
  if(bootstrapping||rawItems.some(isSheet))return false;
  bootstrapping=true;
  status("Preparing first task sheet…");
  try{
    const batch=writeBatch(db);
    const now=Date.now();
    batch.set(itemDocument("sheet-main"),{kind:"sheet",text:"Task sheet 1",order:0,createdAt:now});
    const legacyHeadings=rawItems.filter(isHeading).sort(byOrder);
    legacyHeadings.forEach((heading,index)=>batch.update(itemDocument(heading.id),{sheetId:"sheet-main",order:index*1000}));
    const legacyTasks=rawItems.filter(isTask);
    const headingIds=new Set(legacyHeadings.map(heading=>heading.id));
    const groups=new Map();
    for(const task of legacyTasks){
      const headingId=task.headingId&&headingIds.has(task.headingId)?task.headingId:null;
      const groupKey=headingId||"__general";
      if(!groups.has(groupKey))groups.set(groupKey,[]);
      groups.get(groupKey).push(task);
    }
    for(const [groupKey,groupTasks] of groups){
      groupTasks.sort(byOrder).forEach((task,index)=>batch.update(itemDocument(task.id),{
        kind:"task",
        sheetId:"sheet-main",
        headingId:groupKey==="__general"?null:groupKey,
        order:index*1000
      }));
    }
    batch.set(settingsDocument(),{kind:"settings",activeSheetId:"sheet-main",createdAt:0,updatedAt:now});
    await batch.commit();
    return true;
  }catch(error){
    console.error("Could not create first sheet:",error);
    status("Could not prepare task sheets",true);
    return false;
  }finally{
    bootstrapping=false;
  }
}

  batch.set(settingsDocument(),{kind:"settings",activeSheetId:id,createdAt:0,updatedAt:now},{merge:true});

    return true;

    status("Could not create task sheet",true);

async function deleteCurrentSheet(){
  const list=sheets();
  if(list.length<=1){
    status("Keep at least one task sheet",true);
    return;
  }
  const active=list.find(sheet=>sheet.id===currentSheetId);
  if(!active)return;
  const now=Date.now();
  if(deleteSheetArmedUntil<now){
    deleteSheetArmedUntil=now+3500;
    status(`Tap × again to delete ${active.text}`,true);
    return;
  }
  deleteSheetArmedUntil=0;
  const activeIndex=list.findIndex(sheet=>sheet.id===currentSheetId);
  const nextSheet=list[activeIndex+1]||list[activeIndex-1];
  const doomed=items.filter(item=>item.id===currentSheetId||((isHeading(item)||isTask(item))&&sheetForItem(item)===currentSheetId));
  const batch=writeBatch(db);
  doomed.forEach(item=>batch.delete(itemDocument(item.id)));
  batch.set(settingsDocument(),{kind:"settings",activeSheetId:nextSheet.id,createdAt:0,updatedAt:Date.now()},{merge:true});
  currentSheetId=nextSheet.id;
  status(`Deleting ${active.text}…`);
  try{
    await batch.commit();
  }catch(error){
    console.error("Could not delete sheet:",error);
    status("Could not delete task sheet",true);
  }
}

async function commit(){
  if(busy||!keyboardContext)return;
  busy=true;
  try{
    let saved=false;
    if(keyboardContext.type==="sheet")saved=await addSheet(draft);
    else if(keyboardContext.type==="heading")saved=await addHeading(draft);
    else if(keyboardContext.type==="renameSheet")saved=await renameItem(keyboardContext.itemId,draft,"task sheet");
    else if(keyboardContext.type==="renameHeading")saved=await renameItem(keyboardContext.itemId,draft,"heading");
    else if(keyboardContext.type==="hex"){
      saved=applyHexDraft(draft);
    }else saved=await addTask(draft,keyboardContext.headingId);
    if(saved)closeKeyboard();
  }finally{
    busy=false;
  }
}

function unlockTaskDragScroll(){
  if(!dragState)return;
  taskViewport.style.overflowY=dragState.previousOverflowY||"";
  document.body.classList.remove("task-dragging");
}

function cancelPendingDrag(){
  if(!dragState)return;
  const state=dragState;
  clearTimeout(state.timer);
  if(state.dragging){
    state.row.classList.remove("dragging");
    unlockTaskDragScroll();
  }
  dragState=null;
}

function beginTaskDrag(){
  if(!dragState||dragState.scrolling)return;
  dragState.dragging=true;
  dragState.previousOverflowY=taskViewport.style.overflowY;
  taskViewport.style.overflowY="hidden";
  dragState.row.classList.add("dragging");
  document.body.classList.add("task-dragging");
  status("Drag to reorder · release to save");
}

function startTaskGesture(task,rowElement,{inputType,inputId,clientX,clientY}){
  if(reorderBusy||dragState)return false;
  dragState={
    task,
    row:rowElement,
    parent:rowElement.parentElement,
    inputType,
    inputId,
    startX:clientX,
    startY:clientY,
    startScrollTop:taskViewport.scrollTop,
    scrolling:false,
    dragging:false,
    previousOverflowY:"",
    timer:setTimeout(beginTaskDrag,430)
  };
  return true;
}

function moveTaskGesture(clientX,clientY){
  if(!dragState)return;
  const dx=clientX-dragState.startX;
  const dy=clientY-dragState.startY;

  if(!dragState.dragging){
    if(!dragState.scrolling&&Math.hypot(dx,dy)>10){
      clearTimeout(dragState.timer);
      dragState.scrolling=true;
    }
    if(dragState.scrolling){
      taskViewport.scrollTop=dragState.startScrollTop-dy;
    }
    return;
  }

  const siblings=[...dragState.parent.querySelectorAll(".task")].filter(row=>row!==dragState.row);
  const before=siblings.find(row=>{
    const rect=row.getBoundingClientRect();
    return clientY<rect.top+rect.height/2;
  });
  if(before)dragState.parent.insertBefore(dragState.row,before);
  else dragState.parent.append(dragState.row);

  const viewportRect=taskViewport.getBoundingClientRect();
  if(clientY<viewportRect.top+38)taskViewport.scrollTop-=12;
  else if(clientY>viewportRect.bottom-38)taskViewport.scrollTop+=12;
}

async function saveDraggedOrder(rowElement,parentElement){
  const orderedIds=[...parentElement.querySelectorAll(".task")].map(row=>row.dataset.taskId).filter(Boolean);
  rowElement.classList.remove("dragging");
  unlockTaskDragScroll();
  dragState=null;
  reorderBusy=true;
  const batch=writeBatch(db);
  orderedIds.forEach((id,index)=>{
    const item=items.find(candidate=>candidate.id===id);
    if(item)item.order=index*1000;
    batch.update(itemDocument(id),{order:index*1000});
  });
  render();
  try{
    await batch.commit();
    status("Task order saved");
  }catch(error){
    console.error("Could not save task order:",error);
    status("Could not save task order",true);
  }finally{
    reorderBusy=false;
    render();
  }
}

function finishTaskGesture(){
  if(!dragState)return;
  clearTimeout(dragState.timer);
  if(!dragState.dragging){
    dragState=null;
    return;
  }
  const {row,parent}=dragState;
  saveDraggedOrder(row,parent);
}

function findTrackedTouch(touchList){
  if(!dragState||dragState.inputType!=="touch")return null;
  return [...touchList].find(touch=>touch.identifier===dragState.inputId)||null;
}

function onTaskTouchStart(event,task,rowElement){
  if(event.target.closest("button")||event.touches.length!==1)return;
  const touch=event.changedTouches[0];
  if(!touch)return;
  if(startTaskGesture(task,rowElement,{inputType:"touch",inputId:touch.identifier,clientX:touch.clientX,clientY:touch.clientY})){
    event.preventDefault();
  }
}

function onTaskMouseDown(event,task,rowElement){
  if(event.button!==0||event.target.closest("button"))return;
  if(startTaskGesture(task,rowElement,{inputType:"mouse",inputId:0,clientX:event.clientX,clientY:event.clientY})){
    event.preventDefault();
  }
}

function onDocumentTouchMove(event){
  const touch=findTrackedTouch(event.touches);
  if(!touch)return;
  event.preventDefault();
  event.stopPropagation();
  moveTaskGesture(touch.clientX,touch.clientY);
}

function onDocumentTouchEnd(event){
  if(!dragState||dragState.inputType!=="touch")return;
  const touch=[...event.changedTouches].find(candidate=>candidate.identifier===dragState.inputId);
  if(!touch)return;
  event.preventDefault();
  finishTaskGesture();
}

function onDocumentTouchCancel(event){
  if(!dragState||dragState.inputType!=="touch")return;
  const touch=[...event.changedTouches].find(candidate=>candidate.identifier===dragState.inputId);
  if(touch)cancelPendingDrag();
}

function onDocumentMouseMove(event){
  if(!dragState||dragState.inputType!=="mouse")return;
  event.preventDefault();
  moveTaskGesture(event.clientX,event.clientY);
}

function onDocumentMouseUp(event){
  if(!dragState||dragState.inputType!=="mouse"||event.button!==0)return;
  finishTaskGesture();
}

function bindLongPress(element,callback,{delay=520}={}){
  let state=null;
  let suppressClick=false;
  const clear=()=>{
    if(!state)return;
    clearTimeout(state.timer);
    state=null;
  };
  element.addEventListener("pointerdown",event=>{
    if(event.pointerType==="mouse"&&event.button!==0)return;
    state={
      pointerId:event.pointerId,
      startX:event.clientX,
      startY:event.clientY,
      timer:setTimeout(()=>{
        if(!state)return;
        suppressClick=true;
        callback();
        state=null;
      },delay)
    };
  });
  element.addEventListener("pointermove",event=>{
    if(!state||state.pointerId!==event.pointerId)return;
    if(Math.hypot(event.clientX-state.startX,event.clientY-state.startY)>10)clear();
  });
  element.addEventListener("pointerup",clear);
  element.addEventListener("pointercancel",clear);
  element.addEventListener("click",event=>{
    if(!suppressClick)return;
    suppressClick=false;
    event.preventDefault();
    event.stopImmediatePropagation();
  },true);
}

function createTaskRow(task){
  const li=document.createElement("li");
  li.className=`task${task.done?" done":""}`;
  li.dataset.taskId=task.id;
  li.setAttribute("aria-label",`${task.text}. Hold and drag to reorder.`);
  const check=document.createElement("button");
  check.type="button";
  check.className="check";
  check.setAttribute("aria-label",task.done?`Mark ${task.text} as not done`:`Mark ${task.text} as done`);
  check.setAttribute("aria-pressed",String(task.done));
  check.onclick=()=>toggleTask(task);
  const text=document.createElement("span");
  text.className="task-text";
  text.textContent=task.text;
  const del=document.createElement("button");
  del.type="button";
  del.className="delete";
  del.textContent="×";
  del.setAttribute("aria-label",`Delete ${task.text}`);
  del.onclick=()=>deleteTask(task.id);
  li.append(check,text,del);
  li.addEventListener("touchstart",event=>onTaskTouchStart(event,task,li),{passive:false});
  li.addEventListener("mousedown",event=>onTaskMouseDown(event,task,li));
  return li;
}

function createSection(heading,sectionTasks,{general=false}={}){
  const section=document.createElement("section");
  section.className="section";
  const head=document.createElement("div");
  head.className="section-head";
  const title=document.createElement("h2");
  title.className="section-title";
  title.textContent=heading.text;
  if(!general){
    title.setAttribute("aria-label",`${heading.text}. Hold to rename.`);
    bindLongPress(title,()=>openKeyboard({type:"renameHeading",itemId:heading.id,title:"Rename heading",placeholder:"Type a heading…",maxLength:80,actionLabel:"Save",initialText:heading.text}));
  }
  const actions=document.createElement("div");
  actions.className="section-actions";
  const meta=document.createElement("span");
  meta.className="section-meta";
  meta.textContent=String(sectionTasks.filter(task=>!task.done).length);
  meta.setAttribute("aria-label","Open tasks in heading");
  const add=document.createElement("button");
  add.type="button";
  add.className="section-add";
  add.textContent="+";
  add.setAttribute("aria-label",`Add task to ${heading.text}`);
  add.onclick=()=>openKeyboard({type:"task",headingId:general?null:heading.id,title:heading.text,placeholder:"Type a subtask…",maxLength:180,actionLabel:"Add"});
  actions.append(meta,add);
  if(!general){
    const del=document.createElement("button");
    del.type="button";
    del.className="section-delete";
    del.textContent="×";
    del.setAttribute("aria-label",`Delete heading ${heading.text}`);
    del.onclick=()=>deleteHeading(heading.id);
    actions.append(del);
  }
  head.append(title,actions);
  section.append(head);
  if(sectionTasks.length){
    const ul=document.createElement("ul");
    ul.className="tasks";
    ul.dataset.headingId=general?"":heading.id;
    sectionTasks.sort(byOrder).forEach(task=>ul.append(createTaskRow(task)));
    section.append(ul);
  }else{
    const p=document.createElement("p");
    p.className="section-empty";
    p.textContent="Tap + to add a subtask";
    section.append(p);
  }
  return section;
}

function renderSheets(){
  sheetTabs.replaceChildren();
  const list=sheets();
  for(const sheet of list){
    const button=document.createElement("button");
    button.type="button";
    button.className=`sheet-tab${sheet.id===currentSheetId?" active":""}`;
    button.textContent=sheet.text;
    button.title=sheet.text;
    button.setAttribute("aria-pressed",String(sheet.id===currentSheetId));
    button.setAttribute("aria-label",`${sheet.text}. Hold to rename.`);
    bindLongPress(button,()=>openKeyboard({type:"renameSheet",itemId:sheet.id,title:"Rename task sheet",placeholder:"Name this sheet…",maxLength:40,actionLabel:"Save",initialText:sheet.text}));
    button.addEventListener("click",()=>selectSheet(sheet.id));
    sheetTabs.append(button);
    if(sheet.id===currentSheetId)requestAnimationFrame(()=>button.scrollIntoView({block:"nearest",inline:"nearest"}));
  }
  deleteSheetButton.disabled=list.length<=1;
}

function render(){
  renderSheets();
  sections.replaceChildren();
  const headings=currentHeadings();
  const tasks=currentTasks();
  const headingIds=new Set(headings.map(heading=>heading.id));
  const looseTasks=tasks.filter(task=>!task.headingId||!headingIds.has(task.headingId)).sort(byOrder);
  if(looseTasks.length)sections.append(createSection({id:"general",text:"General"},looseTasks,{general:true}));
  for(const heading of headings){
    sections.append(createSection(heading,tasks.filter(task=>task.headingId===heading.id).sort(byOrder)));
  }
  const done=tasks.filter(task=>task.done).length;
  const open=tasks.length-done;
  openCount.textContent=String(open);
  const hasSections=headings.length>0||looseTasks.length>0;
  emptyState.hidden=!loaded||!currentSheetId||hasSections;
  taskViewport.classList.toggle("empty-mode",loaded&&!!currentSheetId&&!hasSections);
  clearCompleted.disabled=done===0;
  headingInput.disabled=!currentSheetId;
  openHeadingKeyboard.disabled=!currentSheetId;
  progressLabel.textContent=!loaded?"Loading cloud tasks…":!currentSheetId?"Loading task sheets…":tasks.length===0?(headings.length?"No tasks yet":"Nothing to do"):open===0?"All tasks complete":done===0?`${open} ${open===1?"task":"tasks"} to go`:`${done} of ${tasks.length} complete`;
}

function subscribe(){
  status("Loading cloud tasks…");
  if(unsubscribe)unsubscribe();
  unsubscribe=onSnapshot(taskCollection(),async snapshot=>{
    items=snapshot.docs.map(snapshotDoc=>({id:snapshotDoc.id,...snapshotDoc.data()}));
    loaded=true;
    if(!items.some(isSheet)){
      const started=await bootstrapFirstSheet(items);
      if(started)return;
    }
    syncCurrentSheet();
    syncThemeFromSettings();
    if(!reorderBusy)render();
    status("Cloud synced");
  },error=>{
    console.error(error);
    items=[];
    loaded=false;
    currentSheetId=null;
    render();
    status("Sync blocked — update Firestore rules",true);
    progressLabel.textContent="Could not load cloud tasks";
  });
}

touchKeyboard.addEventListener("click",event=>{
  const selectedKey=event.target.closest("button[data-key],button[data-action]");
  if(!selectedKey)return;
  const action=selectedKey.dataset.action;
  if(action==="shift"){shift=!shift;renderKeyboard()}
  else if(action==="backspace")backspace();
  else if(action==="symbols"){mode="symbols";renderKeyboard()}
  else if(action==="letters"){mode="letters";renderKeyboard()}
  else if(action==="commit")commit();
  else if(selectedKey.dataset.key!==undefined)insert(selectedKey.dataset.key);
});

document.addEventListener("keydown",event=>{
  if(keyboardOverlay.hidden)return;
  if(event.key==="Escape")closeKeyboard();
  else if(event.key==="Enter"){event.preventDefault();commit()}
  else if(event.key==="Backspace"){event.preventDefault();backspace()}
  else if(event.key.length===1){event.preventDefault();insert(event.key)}
});

const openHeading=()=>openKeyboard({type:"heading",title:"New heading",placeholder:"Type a heading…",maxLength:80,actionLabel:"Add"});
const openSheet=()=>openKeyboard({type:"sheet",title:"New task sheet",placeholder:"Name this sheet…",maxLength:40,actionLabel:"Create"});

headingForm.addEventListener("submit",event=>{event.preventDefault();openHeading()});
headingInput.addEventListener("click",openHeading);
headingInput.addEventListener("focus",()=>headingInput.blur());
openHeadingKeyboard.addEventListener("click",openHeading);
addSheetButton.addEventListener("click",openSheet);
deleteSheetButton.addEventListener("click",deleteCurrentSheet);
keyboardClose.addEventListener("click",closeKeyboard);
keyboardOverlay.addEventListener("click",event=>{if(event.target===keyboardOverlay)closeKeyboard()});
clearCompleted.addEventListener("click",clearDone);

document.addEventListener("touchmove",onDocumentTouchMove,{passive:false,capture:true});
document.addEventListener("touchend",onDocumentTouchEnd,{passive:false,capture:true});
document.addEventListener("touchcancel",onDocumentTouchCancel,{passive:false,capture:true});
document.addEventListener("mousemove",onDocumentMouseMove,{capture:true});
document.addEventListener("mouseup",onDocumentMouseUp,{capture:true});

themeButton.addEventListener("click",openThemePicker);
themeClose.addEventListener("click",()=>closeThemePicker());
themeCancel.addEventListener("click",()=>closeThemePicker());
themeSave.addEventListener("click",saveTheme);
themeOverlay.addEventListener("click",event=>{if(event.target===themeOverlay)closeThemePicker()});
hexValue.addEventListener("click",()=>openKeyboard({type:"hex",title:"Hex colour",placeholder:pendingAccent,maxLength:7,actionLabel:"Use",shift:false}));
hueSlider.addEventListener("input",()=>{
  pickerHue=Number(hueSlider.value);
  updatePickerFromHsv();
});
function updateColorAreaFromPointer(event){
  const rect=colorArea.getBoundingClientRect();
  pickerSaturation=Math.max(0,Math.min(1,(event.clientX-rect.left)/rect.width));
  pickerValue=1-Math.max(0,Math.min(1,(event.clientY-rect.top)/rect.height));
  updatePickerFromHsv();
}
colorArea.addEventListener("pointerdown",event=>{
  event.preventDefault();
  try{colorArea.setPointerCapture(event.pointerId)}catch{}
  updateColorAreaFromPointer(event);
});
colorArea.addEventListener("pointermove",event=>{
  if(!colorArea.hasPointerCapture(event.pointerId))return;
  event.preventDefault();
  updateColorAreaFromPointer(event);
});
colorArea.addEventListener("pointerup",event=>{
  try{if(colorArea.hasPointerCapture(event.pointerId))colorArea.releasePointerCapture(event.pointerId)}catch{}
});

render();
subscribe();
</script>
</body>
