@media(max-width:430px){.app{padding-inline:9px}.keyboard-overlay{padding:8px}.keyboard-panel{padding:16px 12px 18px;border-radius:24px}.key{height:58px}.section-head{padding-left:10px}.tasks{padding:5px}.task{padding-left:8px}}@media(prefers-reduced-motion:reduce){*,*:before,*:after{transition:none!important;animation:none!important}}
</style>

<body>
<main class="app">
<p class="eyebrow">Y70 Virtual List</p>
<header class="header"><h1>Tasks</h1><div class="count" aria-label="Open task count"><strong id="openCount">0</strong><span>open</span></div></header>
<form class="composer" id="headingForm" autocomplete="off"><input id="headingInput" type="text" maxlength="80" placeholder="Add a heading…" aria-label="Open touch keyboard to add a heading" inputmode="none" readonly><button class="add" id="openHeadingKeyboard" type="button" aria-label="Add heading">+</button></form>
<div class="toolbar"><span id="progressLabel">Loading cloud tasks…</span><button id="clearCompleted" type="button" disabled>Clear done</button></div>
<section class="viewport" id="taskViewport" aria-live="polite"><div class="sections" id="sections"></div><div class="empty" id="emptyState" hidden><div><div class="empty-icon" aria-hidden="true">✓</div><strong>No headings yet.</strong><p>Add a heading above, then use its red + button to add subtasks.</p></div></div></section>
<footer class="footer"><span class="sync" id="syncStatus">Connecting to Firebase…</span></footer>
</main>
<div class="keyboard-overlay" id="keyboardOverlay" role="dialog" aria-modal="true" aria-labelledby="keyboardTitle" hidden><div class="keyboard-panel"><div class="keyboard-head"><h2 id="keyboardTitle">New heading</h2><button class="close" id="keyboardClose" type="button" aria-label="Close keyboard">×</button></div><div class="draft draft-empty" id="draftDisplay" role="textbox" aria-label="Typed text" aria-live="polite"></div><div class="keyboard" id="touchKeyboard" aria-label="Touch keyboard"></div><p class="keyboard-hint" id="keyboardHint">Touch the keys to type</p></div></div>
<script type="module">

const firebaseConfig={apiKey:"AIzaSyBpEQjMvSPwkVbfUYP5KPxFl63SHT54E1E",authDomain:"hyte-fb587.firebaseapp.com",projectId:"hyte-fb587",storageBucket:"hyte-fb587.firebasestorage.app",messagingSenderId:"334285347441",appId:"1:334285347441:web:0563b6cdf1720be66659d0"};

const $=id=>document.getElementById(id),headingForm=$("headingForm"),headingInput=$("headingInput"),openHeadingKeyboard=$("openHeadingKeyboard"),keyboardOverlay=$("keyboardOverlay"),keyboardClose=$("keyboardClose"),touchKeyboard=$("touchKeyboard"),draftDisplay=$("draftDisplay"),keyboardTitle=$("keyboardTitle"),keyboardHint=$("keyboardHint"),sections=$("sections"),taskViewport=$("taskViewport"),emptyState=$("emptyState"),openCount=$("openCount"),progressLabel=$("progressLabel"),clearCompleted=$("clearCompleted"),syncStatus=$("syncStatus");
