<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#090b10">
<title>Y70 Tasks</title>
<style>
:root{color-scheme:dark;--bg:#090b10;--panel:rgba(19,23,32,.94);--text:#f7f8fb;--muted:#959dac;--line:rgba(255,255,255,.1);--accent:#ca3229;--accent-soft:rgba(202,50,41,.16);--danger:#ff6b7a}
*{box-sizing:border-box}[hidden]{display:none!important}html,body{margin:0;height:100%;background:var(--bg);color:var(--text);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;-webkit-tap-highlight-color:transparent}body{min-height:100dvh;overflow:hidden;background:radial-gradient(circle at 50% -8%,rgba(202,50,41,.16),transparent 24rem),linear-gradient(180deg,#0c1016 0%,var(--bg) 42%)}button,input{font:inherit}button{border:0;color:inherit;cursor:pointer;touch-action:manipulation}
.app{width:min(100%,760px);height:100dvh;margin:0 auto;padding:clamp(14px,2.2vh,28px) clamp(14px,3vw,30px) 12px;display:flex;flex-direction:column;gap:12px;overflow:hidden}.header{display:flex;align-items:center;justify-content:space-between;gap:12px;flex:0 0 auto}.eyebrow{margin:0 0 3px;color:var(--accent);font-size:clamp(11px,1.8vw,14px);font-weight:800;letter-spacing:.12em;text-transform:uppercase;text-align:center}h1{margin:0;font-size:clamp(32px,7vw,54px);line-height:.98;letter-spacing:-.05em}.count{min-width:62px;padding:10px;border:1px solid var(--line);border-radius:16px;background:rgba(255,255,255,.045);text-align:center}.count strong{display:block;font-size:clamp(22px,4.5vw,34px);line-height:1}.count span{display:block;margin-top:4px;color:var(--muted);font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase}
.composer{display:grid;grid-template-columns:1fr auto;gap:8px;padding:8px;border:1px solid var(--line);border-radius:18px;background:rgba(15,18,25,.9);box-shadow:0 12px 34px rgba(0,0,0,.28);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);flex:0 0 auto}#taskInput{width:100%;min-width:0;height:clamp(50px,7.5vw,64px);padding:0 14px;border:0;outline:0;border-radius:14px;background:transparent;color:var(--text);font-size:clamp(17px,3vw,24px);cursor:pointer;caret-color:transparent}#taskInput::placeholder{color:#6e7684}.add{width:clamp(50px,7.5vw,64px);height:clamp(50px,7.5vw,64px);border-radius:14px;background:var(--accent);color:#fff;font-size:clamp(28px,5vw,40px);font-weight:500;line-height:1;box-shadow:0 8px 24px rgba(202,50,41,.24)}.add:active{transform:scale(.96)}
.toolbar{display:flex;align-items:center;justify-content:space-between;gap:10px;color:var(--muted);font-size:clamp(12px,2.2vw,16px);flex:0 0 auto}.toolbar button{padding:8px 10px;border-radius:10px;background:transparent;color:var(--muted);font-weight:700}.toolbar button:disabled{opacity:.35;cursor:default}.viewport{flex:1 1 auto;min-height:0;overflow-y:auto;overscroll-behavior:contain;scrollbar-width:thin;padding-right:3px}.viewport.empty-mode{overflow-y:hidden;padding-right:0}.tasks{display:flex;flex-direction:column;gap:8px;margin:0;padding:0 0 4px;list-style:none}.task{display:grid;grid-template-columns:auto minmax(0,1fr) auto;align-items:center;gap:10px;min-height:clamp(58px,9vw,74px);padding:9px 10px 9px 12px;border:1px solid var(--line);border-radius:16px;background:var(--panel);transition:opacity 160ms ease,transform 160ms ease}.task:active{transform:scale(.992)}.task.done{opacity:.58;background:rgba(19,23,32,.66)}.check{position:relative;width:clamp(32px,5.5vw,42px);height:clamp(32px,5.5vw,42px);border:2px solid #66707f;border-radius:50%;background:transparent}.task.done .check{border-color:var(--accent);background:var(--accent)}.task.done .check:after{content:"";position:absolute;left:34%;top:19%;width:20%;height:42%;border:solid #fff;border-width:0 3px 3px 0;transform:rotate(45deg)}.task-text{min-width:0;overflow-wrap:anywhere;font-size:clamp(16px,3.2vw,22px);font-weight:650;line-height:1.2;letter-spacing:-.02em}.task.done .task-text{color:#9ca3ad;text-decoration:line-through;text-decoration-thickness:2px}.delete{display:grid;place-items:center;width:clamp(36px,6vw,44px);height:clamp(36px,6vw,44px);border-radius:12px;background:transparent;color:#77808f;font-size:clamp(22px,4vw,28px)}.delete:active{background:rgba(255,107,122,.12);color:var(--danger)}
.empty{display:grid;place-items:center;height:100%;min-height:0;padding:18px;border:1px dashed rgba(255,255,255,.14);border-radius:20px;text-align:center;color:var(--muted)}.empty-icon{display:grid;place-items:center;width:64px;height:64px;margin:0 auto 14px;border-radius:20px;background:var(--accent-soft);color:var(--accent);font-size:34px}.empty strong{display:block;margin-bottom:6px;color:var(--text);font-size:clamp(20px,4vw,28px)}.empty p{max-width:360px;margin:0;font-size:clamp(14px,2.7vw,18px);line-height:1.45}.footer{flex:0 0 auto;padding-top:2px;color:#5e6673;font-size:11px;text-align:center}.sync.error{color:var(--danger)}
body.keyboard-open{overflow:hidden}.keyboard-overlay{position:fixed;inset:0;z-index:50;display:flex;align-items:flex-end;justify-content:center;padding:16px;background:rgba(2,4,8,.82);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)}.keyboard-panel{width:min(100%,760px);max-height:calc(100dvh - 32px);overflow-y:auto;padding:clamp(20px,4vw,32px);border:1px solid var(--line);border-radius:30px;background:rgba(15,18,25,.98);box-shadow:0 30px 100px rgba(0,0,0,.62)}.keyboard-head{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:18px}.keyboard-head h2{margin:0;font-size:clamp(28px,5vw,42px);letter-spacing:-.035em}.close{display:grid;place-items:center;width:clamp(54px,9vw,68px);height:clamp(54px,9vw,68px);border-radius:18px;background:rgba(255,255,255,.06);color:var(--muted);font-size:clamp(28px,5vw,38px)}.draft{min-height:clamp(92px,15vw,132px);margin-bottom:18px;padding:20px 22px;border:1px solid rgba(202,50,41,.34);border-radius:22px;background:#0a0d12;color:var(--text);font-size:clamp(25px,4.5vw,34px);font-weight:650;line-height:1.3;overflow-wrap:anywhere}.draft.draft-empty{color:#6e7684}.caret{display:inline-block;width:3px;height:1em;margin-left:3px;vertical-align:-.12em;border-radius:2px;background:var(--accent);animation:blink 900ms steps(1) infinite}@keyframes blink{50%{opacity:0}}.keyboard{display:flex;flex-direction:column;gap:clamp(7px,1.4vw,11px);user-select:none;-webkit-user-select:none}.key-row{display:flex;justify-content:center;gap:clamp(5px,1.1vw,9px)}.key{display:grid;place-items:center;flex:1 1 0;min-width:0;height:clamp(56px,9.5vw,76px);padding:0 4px;border:1px solid rgba(255,255,255,.08);border-radius:clamp(10px,2vw,16px);background:#252b36;color:var(--text);font-size:clamp(18px,3.5vw,27px);font-weight:750}.key:active{transform:scale(.94);background:#343c49}.key-wide{flex:1.55 1 0}.key-space{flex:4.2 1 0;color:var(--muted);font-size:clamp(15px,2.7vw,20px)}.key-action{flex:2.2 1 0;background:var(--accent);color:#fff}.key-shift.active{background:var(--accent-soft);border-color:rgba(202,50,41,.5);color:var(--accent)}.keyboard-hint{margin:16px 0 0;color:#687180;font-size:clamp(12px,2.2vw,16px);text-align:center}
@media(max-width:430px){.app{padding-inline:10px}#taskInput{padding-inline:12px}.toolbar{padding-inline:2px}.keyboard-overlay{padding:8px}.keyboard-panel{padding:16px 12px 18px;border-radius:24px}.key{height:58px}}@media(prefers-reduced-motion:reduce){*,*:before,*:after{transition:none!important;animation:none!important}}
</style>
</head>
<body>
<main class="app">
<header class="header"><div><p class="eyebrow">Y70 Virtual List</p><h1>Tasks</h1></div><div class="count" aria-label="Open task count"><strong id="openCount">0</strong><span>open</span></div></header>
<form class="composer" id="taskForm" autocomplete="off"><input id="taskInput" type="text" maxlength="180" placeholder="Add a task…" aria-label="Open touch keyboard to add a new task" inputmode="none" readonly><button class="add" id="openKeyboardButton" type="button" aria-label="Open touch keyboard">+</button></form>
<div class="toolbar"><span id="progressLabel">Loading cloud tasks…</span><button id="clearCompleted" type="button" disabled>Clear done</button></div>
<section class="viewport" id="taskViewport" aria-live="polite"><ul class="tasks" id="taskList"></ul><div class="empty" id="emptyState" hidden><div><div class="empty-icon" aria-hidden="true">✓</div><strong>You're all clear.</strong><p>Add a task above. This list reloads from Firebase automatically.</p></div></div></section>
<footer class="footer"><span class="sync" id="syncStatus">Connecting to Firebase…</span></footer>
</main>
<div class="keyboard-overlay" id="keyboardOverlay" role="dialog" aria-modal="true" aria-labelledby="keyboardTitle" hidden><div class="keyboard-panel"><div class="keyboard-head"><h2 id="keyboardTitle">New task</h2><button class="close" id="keyboardClose" type="button" aria-label="Close keyboard">×</button></div><div class="draft draft-empty" id="draftDisplay" role="textbox" aria-label="New task text" aria-live="polite"></div><div class="keyboard" id="touchKeyboard" aria-label="Touch keyboard"></div><p class="keyboard-hint">Touch the keys to type · 180 characters maximum</p></div></div>
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
import{collection,deleteDoc,doc,initializeFirestore,memoryLocalCache,onSnapshot,orderBy,query,setDoc,updateDoc,writeBatch}from"https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";
const firebaseConfig={apiKey:"AIzaSyBpEQjMvSPwkVbfUYP5KPxFl63SHT54E1E",authDomain:"hyte-fb587.firebaseapp.com",projectId:"hyte-fb587",storageBucket:"hyte-fb587.firebasestorage.app",messagingSenderId:"334285347441",appId:"1:334285347441:web:0563b6cdf1720be66659d0"};
const db=initializeFirestore(initializeApp(firebaseConfig),{localCache:memoryLocalCache()});
const $=id=>document.getElementById(id),taskForm=$("taskForm"),taskInput=$("taskInput"),openKeyboardButton=$("openKeyboardButton"),keyboardOverlay=$("keyboardOverlay"),keyboardClose=$("keyboardClose"),touchKeyboard=$("touchKeyboard"),draftDisplay=$("draftDisplay"),taskList=$("taskList"),taskViewport=$("taskViewport"),emptyState=$("emptyState"),openCount=$("openCount"),progressLabel=$("progressLabel"),clearCompleted=$("clearCompleted"),syncStatus=$("syncStatus");
let tasks=[],loaded=false,draft="",shift=true,mode="letters",busy=false,unsubscribe=null;
const taskCollection=()=>collection(db,"lists","main","tasks"),taskDocument=id=>doc(db,"lists","main","tasks",id),makeId=()=>crypto.randomUUID?crypto.randomUUID():`${Date.now()}-${Math.random().toString(16).slice(2)}`;
function status(text,error=false){syncStatus.textContent=text;syncStatus.classList.toggle("error",error)}
function key(label,{value=null,action=null,className="",aria=""}={}){const b=document.createElement("button");b.type="button";b.className=`key ${className}`.trim();b.textContent=label;if(value!==null)b.dataset.key=value;if(action)b.dataset.action=action;if(aria)b.setAttribute("aria-label",aria);return b}
function row(keys){const r=document.createElement("div");r.className="key-row";r.append(...keys);touchKeyboard.append(r)}
function renderKeyboard(){touchKeyboard.replaceChildren();if(mode==="letters"){row([..."1234567890"].map(v=>key(v,{value:v})));row([..."qwertyuiop"].map(v=>key(shift?v.toUpperCase():v,{value:v})));row([..."asdfghjkl"].map(v=>key(shift?v.toUpperCase():v,{value:v})));const sh=key("⇧",{action:"shift",className:`key-wide key-shift${shift?" active":""}`,aria:"Shift"});sh.setAttribute("aria-pressed",String(shift));row([sh,...[..."zxcvbnm"].map(v=>key(shift?v.toUpperCase():v,{value:v})),key("⌫",{action:"backspace",className:"key-wide",aria:"Backspace"})]);row([key("#+=",{action:"symbols",className:"key-wide",aria:"Show symbols"}),key(".",{value:"."}),key(",",{value:","}),key("Space",{value:" ",className:"key-space"}),key("-",{value:"-"}),key("Add",{action:"commit",className:"key-action"})])}else{for(const symbols of [["!","@","#","$","%","^","&","*","(",")"],["-","_","+","=","/","\\",":",";","'",'"'],["[","]","{","}","<",">",",",".","?","`"]])row(symbols.map(v=>key(v,{value:v})));row([key("ABC",{action:"letters",className:"key-wide",aria:"Show letters"}),key("Space",{value:" ",className:"key-space"}),key("⌫",{action:"backspace",className:"key-wide",aria:"Backspace"}),key("Add",{action:"commit",className:"key-action"})])}}
function renderDraft(){draftDisplay.replaceChildren();const empty=!draft;draftDisplay.classList.toggle("draft-empty",empty);draftDisplay.append(document.createTextNode(empty?"Type your task…":draft));const c=document.createElement("span");c.className="caret";c.setAttribute("aria-hidden","true");draftDisplay.append(c)}
function openKeyboard(){draft="";shift=true;mode="letters";busy=false;renderDraft();renderKeyboard();keyboardOverlay.hidden=false;document.body.classList.add("keyboard-open")}
function closeKeyboard(){keyboardOverlay.hidden=true;document.body.classList.remove("keyboard-open");draft="";busy=false;touchKeyboard.replaceChildren()}
function insert(value){if([...draft].length>=180)return;draft+=/^[a-z]$/i.test(value)?shift?value.toUpperCase():value.toLowerCase():value;renderDraft();if(/^[a-z]$/i.test(value)&&shift){shift=false;renderKeyboard()}}
function backspace(){if(!draft)return;draft=[...draft].slice(0,-1).join("");renderDraft()}
async function addTask(text){const clean=text.trim();if(!clean)return false;status("Saving…");try{const id=makeId();await setDoc(taskDocument(id),{text:clean,done:false,createdAt:Date.now()});return true}catch(error){console.error(error);status("Save failed — check Firestore rules",true);return false}}
async function commit(){if(busy)return;busy=true;try{if(await addTask(draft))closeKeyboard()}finally{busy=false}}
async function toggleTask(task){try{await updateDoc(taskDocument(task.id),{done:!task.done})}catch(error){console.error(error);status("Update failed — check Firestore rules",true)}}
async function deleteTask(id){try{await deleteDoc(taskDocument(id))}catch(error){console.error(error);status("Delete failed — check Firestore rules",true)}}
async function clearDone(){const done=tasks.filter(t=>t.done);if(!done.length)return;try{const batch=writeBatch(db);done.forEach(t=>batch.delete(taskDocument(t.id)));await batch.commit()}catch(error){console.error(error);status("Could not clear completed tasks",true)}}
function render(){taskList.replaceChildren();for(const task of tasks){const li=document.createElement("li");li.className=`task${task.done?" done":""}`;const check=document.createElement("button");check.type="button";check.className="check";check.setAttribute("aria-label",task.done?`Mark ${task.text} as not done`:`Mark ${task.text} as done`);check.setAttribute("aria-pressed",String(task.done));check.onclick=()=>toggleTask(task);const text=document.createElement("span");text.className="task-text";text.textContent=task.text;const del=document.createElement("button");del.type="button";del.className="delete";del.textContent="×";del.setAttribute("aria-label",`Delete ${task.text}`);del.onclick=()=>deleteTask(task.id);li.append(check,text,del);taskList.append(li)}const done=tasks.filter(t=>t.done).length,open=tasks.length-done;openCount.textContent=String(open);emptyState.hidden=!loaded||tasks.length>0;taskViewport.classList.toggle("empty-mode",loaded&&tasks.length===0);clearCompleted.disabled=done===0;progressLabel.textContent=!loaded?"Loading cloud tasks…":tasks.length===0?"Nothing to do":open===0?"All tasks complete":done===0?`${open} ${open===1?"task":"tasks"} to go`:`${done} of ${tasks.length} complete`}
function subscribe(){status("Loading cloud tasks…");if(unsubscribe)unsubscribe();unsubscribe=onSnapshot(query(taskCollection(),orderBy("createdAt","desc")),snapshot=>{tasks=snapshot.docs.map(d=>({id:d.id,...d.data()})).filter(t=>typeof t.id==="string"&&typeof t.text==="string"&&typeof t.done==="boolean");loaded=true;render();status("Cloud synced")},error=>{console.error(error);tasks=[];loaded=false;render();status("Sync blocked — update Firestore rules",true);progressLabel.textContent="Could not load cloud tasks"})}
touchKeyboard.addEventListener("click",event=>{const k=event.target.closest("button[data-key],button[data-action]");if(!k)return;const a=k.dataset.action;if(a==="shift"){shift=!shift;renderKeyboard()}else if(a==="backspace")backspace();else if(a==="symbols"){mode="symbols";renderKeyboard()}else if(a==="letters"){mode="letters";renderKeyboard()}else if(a==="commit")commit();else if(k.dataset.key!==undefined)insert(k.dataset.key)});
document.addEventListener("keydown",event=>{if(keyboardOverlay.hidden)return;if(event.key==="Escape")closeKeyboard();else if(event.key==="Enter"){event.preventDefault();commit()}else if(event.key==="Backspace"){event.preventDefault();backspace()}else if(event.key.length===1){event.preventDefault();insert(event.key)}});
taskForm.addEventListener("submit",event=>{event.preventDefault();openKeyboard()});taskInput.addEventListener("click",openKeyboard);taskInput.addEventListener("focus",()=>taskInput.blur());openKeyboardButton.addEventListener("click",openKeyboard);keyboardClose.addEventListener("click",closeKeyboard);keyboardOverlay.addEventListener("click",event=>{if(event.target===keyboardOverlay)closeKeyboard()});clearCompleted.addEventListener("click",clearDone);render();subscribe();
</script>
</body>
</html>
