<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#090b10">
<title>Y70 Tasks</title>
<style>
:root{color-scheme:dark;--bg:#090b10;--panel:rgba(19,23,32,.92);--text:#f7f8fb;--muted:#959dac;--line:rgba(255,255,255,.1);--accent:#9bf00b;--accent-soft:rgba(155,240,11,.14);--danger:#ff6b7a;--shadow:0 24px 70px rgba(0,0,0,.35);--radius:28px}*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:var(--bg);color:var(--text);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;-webkit-tap-highlight-color:transparent}body{min-height:100dvh;overflow-x:hidden;background:radial-gradient(circle at 50% -8%,rgba(155,240,11,.13),transparent 28rem),linear-gradient(180deg,#0c1016 0%,var(--bg) 42%)}button,input{font:inherit}button{border:0;color:inherit;cursor:pointer;touch-action:manipulation}.app{width:min(100%,760px);min-height:100dvh;margin:0 auto;padding:clamp(28px,5vh,72px) clamp(20px,5vw,48px) 52px;display:flex;flex-direction:column;gap:26px}.header{display:flex;align-items:flex-start;justify-content:space-between;gap:20px}.eyebrow{margin:0 0 8px;color:var(--accent);font-size:clamp(13px,2.4vw,17px);font-weight:800;letter-spacing:.18em;text-transform:uppercase}h1{margin:0;font-size:clamp(42px,10vw,82px);line-height:.96;letter-spacing:-.055em}.date{margin:14px 0 0;color:var(--muted);font-size:clamp(16px,3vw,23px);line-height:1.35}.count-badge{min-width:84px;padding:16px 14px;border:1px solid var(--line);border-radius:22px;background:rgba(255,255,255,.045);text-align:center}.count-badge strong{display:block;font-size:clamp(27px,6vw,45px);line-height:1}.count-badge span{display:block;margin-top:7px;color:var(--muted);font-size:13px;font-weight:700;letter-spacing:.08em;text-transform:uppercase}.composer{position:sticky;top:16px;z-index:4;display:grid;grid-template-columns:1fr auto;gap:12px;padding:12px;border:1px solid var(--line);border-radius:var(--radius);background:rgba(15,18,25,.88);box-shadow:var(--shadow);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px)}#taskInput{width:100%;min-width:0;height:clamp(66px,10vw,86px);padding:0 22px;border:0;outline:0;border-radius:20px;background:transparent;color:var(--text);font-size:clamp(21px,4vw,30px);cursor:pointer;caret-color:transparent}#taskInput::placeholder{color:#6e7684}.add-button{width:clamp(66px,13vw,88px);height:clamp(66px,13vw,88px);border-radius:20px;background:var(--accent);color:#11150a;font-size:clamp(36px,7vw,54px);font-weight:400;line-height:1;box-shadow:0 10px 30px rgba(155,240,11,.18)}.add-button:active{transform:scale(.96)}.toolbar{display:flex;align-items:center;justify-content:space-between;gap:14px;color:var(--muted);font-size:clamp(15px,2.7vw,20px)}.toolbar button{padding:12px 16px;border-radius:14px;background:transparent;color:var(--muted);font-weight:700}.toolbar button:disabled{opacity:.35;cursor:default}.task-list{display:flex;flex-direction:column;gap:14px;margin:0;padding:0;list-style:none}.task{display:grid;grid-template-columns:auto minmax(0,1fr) auto;align-items:center;gap:17px;min-height:clamp(86px,14vw,116px);padding:18px 16px 18px 20px;border:1px solid var(--line);border-radius:24px;background:var(--panel)}.task:active{transform:scale(.992)}.task.done{opacity:.58;background:rgba(19,23,32,.66)}.check{position:relative;width:clamp(42px,8vw,58px);height:clamp(42px,8vw,58px);border:2px solid #66707f;border-radius:50%;background:transparent}.task.done .check{border-color:var(--accent);background:var(--accent)}.task.done .check::after{content:"";position:absolute;left:34%;top:19%;width:20%;height:42%;border:solid #0f1309;border-width:0 4px 4px 0;transform:rotate(45deg)}.task-text{min-width:0;overflow-wrap:anywhere;font-size:clamp(21px,4.2vw,32px);font-weight:650;line-height:1.26;letter-spacing:-.02em}.task.done .task-text{color:#9ca3ad;text-decoration:line-through;text-decoration-thickness:2px}.delete{display:grid;place-items:center;width:clamp(48px,9vw,62px);height:clamp(48px,9vw,62px);border-radius:18px;background:transparent;color:#77808f;font-size:clamp(25px,5vw,35px)}.delete:active{background:rgba(255,107,122,.12);color:var(--danger)}.empty{display:grid;place-items:center;min-height:390px;padding:44px 28px;border:1px dashed rgba(255,255,255,.14);border-radius:var(--radius);text-align:center;color:var(--muted)}.empty-icon{display:grid;place-items:center;width:92px;height:92px;margin:0 auto 22px;border-radius:30px;background:var(--accent-soft);color:var(--accent);font-size:48px}.empty strong{display:block;margin-bottom:9px;color:var(--text);font-size:clamp(26px,5vw,38px)}.empty p{max-width:360px;margin:0;font-size:clamp(17px,3.2vw,23px);line-height:1.45}.footer{margin-top:auto;padding-top:22px;color:#5e6673;font-size:13px;text-align:center}body.keyboard-open{overflow:hidden}.keyboard-overlay{position:fixed;inset:0;z-index:50;display:flex;align-items:flex-end;justify-content:center;padding:16px;background:rgba(2,4,8,.82);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)}.keyboard-overlay[hidden]{display:none}.keyboard-panel{width:min(100%,760px);max-height:calc(100dvh - 32px);overflow-y:auto;padding:clamp(20px,4vw,32px);border:1px solid var(--line);border-radius:30px;background:rgba(15,18,25,.98);box-shadow:0 30px 100px rgba(0,0,0,.62)}.keyboard-header{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:18px}.keyboard-title{margin:0;font-size:clamp(28px,5vw,42px);letter-spacing:-.035em}.keyboard-close{display:grid;place-items:center;width:clamp(54px,9vw,68px);height:clamp(54px,9vw,68px);border-radius:18px;background:rgba(255,255,255,.06);color:var(--muted);font-size:clamp(28px,5vw,38px)}.draft-display{min-height:clamp(92px,15vw,132px);margin-bottom:18px;padding:20px 22px;border:1px solid rgba(155,240,11,.28);border-radius:22px;background:#0a0d12;color:var(--text);font-size:clamp(25px,4.5vw,34px);font-weight:650;line-height:1.3;overflow-wrap:anywhere}.draft-display.empty{color:#6e7684}.draft-caret{display:inline-block;width:3px;height:1em;margin-left:3px;vertical-align:-.12em;border-radius:2px;background:var(--accent);animation:blink 900ms steps(1) infinite}@keyframes blink{50%{opacity:0}}.keyboard{display:flex;flex-direction:column;gap:clamp(7px,1.4vw,11px);user-select:none;-webkit-user-select:none}.keyboard-row{display:flex;justify-content:center;gap:clamp(5px,1.1vw,9px)}.key{display:grid;place-items:center;flex:1 1 0;min-width:0;height:clamp(56px,9.5vw,76px);padding:0 4px;border:1px solid rgba(255,255,255,.08);border-radius:clamp(10px,2vw,16px);background:#252b36;color:var(--text);font-size:clamp(18px,3.5vw,27px);font-weight:750}.key:active{transform:scale(.94);background:#343c49}.key-wide{flex:1.55 1 0}.key-space{flex:4.8 1 0;color:var(--muted);font-size:clamp(15px,2.7vw,20px)}.key-add{flex:2.2 1 0;background:var(--accent);color:#11150a}.key-shift.active{background:var(--accent-soft);border-color:rgba(155,240,11,.45);color:var(--accent)}.keyboard-hint{margin:16px 0 0;color:#687180;font-size:clamp(12px,2.2vw,16px);text-align:center}@media(max-width:430px){.app{padding-inline:14px}.composer{gap:8px;padding:8px;border-radius:22px}#taskInput{padding-inline:15px}.task{gap:13px;padding-left:16px}.toolbar{padding-inline:4px}.keyboard-overlay{padding:8px}.keyboard-panel{padding:16px 12px 18px;border-radius:24px}.key{height:58px}}@media(prefers-reduced-motion:reduce){*,*::before,*::after{scroll-behavior:auto!important;transition:none!important}}
</style>
</head>
<body>
<main class="app">
<header class="header"><div><p class="eyebrow">Y70 Dashboard</p><h1>Tasks</h1><p class="date" id="dateLabel"></p></div><div class="count-badge" aria-label="Open task count"><strong id="openCount">0</strong><span>open</span></div></header>
<form class="composer" id="taskForm" autocomplete="off"><input id="taskInput" name="task" type="text" maxlength="180" placeholder="Add a task…" aria-label="Open touch keyboard to add a new task" inputmode="none" readonly><button class="add-button" id="openKeyboardButton" type="button" aria-label="Open touch keyboard">+</button></form>
<div class="toolbar"><span id="progressLabel">Nothing to do</span><button id="clearCompleted" type="button" disabled>Clear done</button></div>
<section aria-live="polite"><ul class="task-list" id="taskList"></ul><div class="empty" id="emptyState"><div><div class="empty-icon" aria-hidden="true">✓</div><strong>You're all clear.</strong><p>Add a task above. Your list is saved on this device automatically.</p></div></div></section>
<footer class="footer">Saved locally in this browser · no account · no tracking</footer>
</main>
<div class="keyboard-overlay" id="keyboardOverlay" role="dialog" aria-modal="true" aria-labelledby="keyboardTitle" hidden><div class="keyboard-panel"><div class="keyboard-header"><h2 class="keyboard-title" id="keyboardTitle">New task</h2><button class="keyboard-close" id="keyboardClose" type="button" aria-label="Close keyboard">×</button></div><div class="draft-display empty" id="draftDisplay" role="textbox" aria-label="New task text" aria-live="polite"></div><div class="keyboard" id="touchKeyboard" aria-label="Touch keyboard"><div class="keyboard-row" id="numberRow"></div><div class="keyboard-row" id="row1"></div><div class="keyboard-row" id="row2"></div><div class="keyboard-row" id="row3"></div><div class="keyboard-row"><button class="key" type="button" data-key=".">.</button><button class="key" type="button" data-key=",">,</button><button class="key key-space" type="button" data-key=" ">Space</button><button class="key" type="button" data-key="-">-</button><button class="key key-add" type="button" data-action="add">Add</button></div></div><p class="keyboard-hint">Touch the keys to type · 180 characters maximum</p></div></div>
<script>
(()=>{"use strict";const STORAGE_KEY="hyte-y70-tasks-v1";const taskForm=document.getElementById("taskForm"),taskInput=document.getElementById("taskInput"),openKeyboardButton=document.getElementById("openKeyboardButton"),keyboardOverlay=document.getElementById("keyboardOverlay"),keyboardClose=document.getElementById("keyboardClose"),touchKeyboard=document.getElementById("touchKeyboard"),draftDisplay=document.getElementById("draftDisplay"),taskList=document.getElementById("taskList"),emptyState=document.getElementById("emptyState"),openCount=document.getElementById("openCount"),progressLabel=document.getElementById("progressLabel"),clearCompleted=document.getElementById("clearCompleted"),dateLabel=document.getElementById("dateLabel");let tasks=loadTasks(),draftText="",shiftOn=true;function makeKey(label,key,action,extra=""){const b=document.createElement("button");b.type="button";b.className=`key ${extra}`.trim();b.textContent=label;if(key!==null)b.dataset.key=key;if(action)b.dataset.action=action;return b}function buildKeyboard(){for(const c of "1234567890")document.getElementById("numberRow").append(makeKey(c,c));for(const c of "qwertyuiop")document.getElementById("row1").append(makeKey(c.toUpperCase(),c));for(const c of "asdfghjkl")document.getElementById("row2").append(makeKey(c.toUpperCase(),c));const row3=document.getElementById("row3"),shift=makeKey("⇧",null,"shift","key-wide key-shift active");shift.id="shiftKey";shift.setAttribute("aria-pressed","true");row3.append(shift);for(const c of "zxcvbnm")row3.append(makeKey(c.toUpperCase(),c));const back=makeKey("⌫",null,"backspace","key-wide");back.setAttribute("aria-label","Backspace");row3.append(back)}function loadTasks(){try{const parsed=JSON.parse(localStorage.getItem(STORAGE_KEY)||"[]");return Array.isArray(parsed)?parsed.filter(t=>t&&typeof t.id==="string"&&typeof t.text==="string"&&typeof t.done==="boolean"):[]}catch(e){console.warn("Could not load saved tasks:",e);return[]}}function saveTasks(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(tasks))}catch(e){console.warn("Could not save tasks:",e)}}function makeId(){return window.crypto&&typeof window.crypto.randomUUID==="function"?window.crypto.randomUUID():`${Date.now()}-${Math.random().toString(16).slice(2)}`}function addTask(text){const clean=text.trim();if(!clean)return false;tasks.unshift({id:makeId(),text:clean,done:false,createdAt:Date.now()});saveTasks();render();return true}function renderDraft(){draftDisplay.replaceChildren();draftDisplay.classList.toggle("empty",!draftText);draftDisplay.append(document.createTextNode(draftText||"Type your task…"));const caret=document.createElement("span");caret.className="draft-caret";caret.setAttribute("aria-hidden","true");draftDisplay.append(caret)}function shiftKey(){return document.getElementById("shiftKey")}function setShift(enabled){shiftOn=enabled;shiftKey().classList.toggle("active",shiftOn);shiftKey().setAttribute("aria-pressed",String(shiftOn))}function openKeyboard(){draftText="";taskInput.value="";setShift(true);renderDraft();keyboardOverlay.hidden=false;document.body.classList.add("keyboard-open")}function closeKeyboard(){keyboardOverlay.hidden=true;document.body.classList.remove("keyboard-open");draftText="";taskInput.value=""}function insertKey(value){if(draftText.length>=180)return;let next=value;if(/^[a-z]$/i.test(value))next=shiftOn?value.toUpperCase():value.toLowerCase();draftText+=next;taskInput.value=draftText;renderDraft();if(/^[a-z]$/i.test(value)&&shiftOn)setShift(false)}function backspace(){if(!draftText)return;draftText=Array.from(draftText).slice(0,-1).join("");taskInput.value=draftText;renderDraft()}function submitDraft(){if(addTask(draftText))closeKeyboard()}function toggleTask(id){tasks=tasks.map(t=>t.id===id?{...t,done:!t.done}:t);saveTasks();render()}function deleteTask(id){tasks=tasks.filter(t=>t.id!==id);saveTasks();render()}function render(){taskList.replaceChildren();for(const task of tasks){const item=document.createElement("li");item.className=`task${task.done?" done":""}`;const check=document.createElement("button");check.type="button";check.className="check";check.setAttribute("aria-label",task.done?`Mark ${task.text} as not done`:`Mark ${task.text} as done`);check.setAttribute("aria-pressed",String(task.done));check.addEventListener("click",()=>toggleTask(task.id));const text=document.createElement("span");text.className="task-text";text.textContent=task.text;const del=document.createElement("button");del.type="button";del.className="delete";del.textContent="×";del.setAttribute("aria-label",`Delete ${task.text}`);del.addEventListener("click",()=>deleteTask(task.id));item.append(check,text,del);taskList.append(item)}const done=tasks.filter(t=>t.done).length,open=tasks.length-done;openCount.textContent=String(open);emptyState.hidden=tasks.length>0;clearCompleted.disabled=done===0;progressLabel.textContent=tasks.length===0?"Nothing to do":open===0?"All tasks complete":done===0?`${open} ${open===1?"task":"tasks"} to go`:`${done} of ${tasks.length} complete`}buildKeyboard();taskForm.addEventListener("submit",e=>{e.preventDefault();openKeyboard()});taskInput.addEventListener("click",openKeyboard);taskInput.addEventListener("focus",()=>taskInput.blur());openKeyboardButton.addEventListener("click",openKeyboard);keyboardClose.addEventListener("click",closeKeyboard);keyboardOverlay.addEventListener("click",e=>{if(e.target===keyboardOverlay)closeKeyboard()});touchKeyboard.addEventListener("click",e=>{const key=e.target.closest("button[data-key],button[data-action]");if(!key)return;const action=key.dataset.action;if(action==="shift")setShift(!shiftOn);else if(action==="backspace")backspace();else if(action==="add")submitDraft();else if(key.dataset.key!==undefined)insertKey(key.dataset.key)});document.addEventListener("keydown",e=>{if(keyboardOverlay.hidden)return;if(e.key==="Escape")closeKeyboard();else if(e.key==="Enter")submitDraft();else if(e.key==="Backspace"){e.preventDefault();backspace()}else if(e.key.length===1&&draftText.length<180){e.preventDefault();draftText+=e.key;taskInput.value=draftText;renderDraft()}});clearCompleted.addEventListener("click",()=>{tasks=tasks.filter(t=>!t.done);saveTasks();render()});dateLabel.textContent=new Intl.DateTimeFormat(undefined,{weekday:"long",day:"numeric",month:"long"}).format(new Date());render()})();
</script>
</body>
</html>
