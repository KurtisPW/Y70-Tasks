<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#090b10" />
  <title>Y70 Tasks</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #090b10;
      --panel: rgba(19, 23, 32, 0.92);
      --panel-strong: #151a24;
      --text: #f7f8fb;
      --muted: #959dac;
      --line: rgba(255, 255, 255, 0.10);
      --accent: #9bf00b;
      --accent-soft: rgba(155, 240, 11, 0.14);
      --danger: #ff6b7a;
      --shadow: 0 24px 70px rgba(0, 0, 0, 0.35);
      --radius: 28px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      min-height: 100dvh;
      overflow-x: hidden;
      background:
        radial-gradient(circle at 50% -8%, rgba(155, 240, 11, 0.13), transparent 28rem),
        linear-gradient(180deg, #0c1016 0%, var(--bg) 42%);
    }

    button, input { font: inherit; }

    button {
      border: 0;
      color: inherit;
      cursor: pointer;
      touch-action: manipulation;
    }

    .app {
      width: min(100%, 760px);
      min-height: 100dvh;
      margin: 0 auto;
      padding: clamp(28px, 5vh, 72px) clamp(20px, 5vw, 48px) 52px;
      display: flex;
      flex-direction: column;
      gap: 26px;
    }

    .header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 20px;
    }

    .eyebrow {
      margin: 0 0 8px;
      color: var(--accent);
      font-size: clamp(13px, 2.4vw, 17px);
      font-weight: 800;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(42px, 10vw, 82px);
      line-height: 0.96;
      letter-spacing: -0.055em;
    }

    .date {
      margin: 14px 0 0;
      color: var(--muted);
      font-size: clamp(16px, 3vw, 23px);
      line-height: 1.35;
    }

    .count-badge {
      min-width: 84px;
      padding: 16px 14px;
      border: 1px solid var(--line);
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.045);
      text-align: center;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
    }

    .count-badge strong {
      display: block;
      font-size: clamp(27px, 6vw, 45px);
      line-height: 1;
    }

    .count-badge span {
      display: block;
      margin-top: 7px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .composer {
      position: sticky;
      top: 16px;
      z-index: 4;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(15, 18, 25, 0.88);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    #taskInput {
      width: 100%;
      min-width: 0;
      height: clamp(66px, 10vw, 86px);
      padding: 0 22px;
      border: 0;
      outline: 0;
      border-radius: 20px;
      background: transparent;
      color: var(--text);
      font-size: clamp(21px, 4vw, 30px);
    }

    #taskInput::placeholder { color: #6e7684; }

    .add-button {
      width: clamp(66px, 13vw, 88px);
      height: clamp(66px, 13vw, 88px);
      border-radius: 20px;
      background: var(--accent);
      color: #11150a;
      font-size: clamp(36px, 7vw, 54px);
      font-weight: 400;
      line-height: 1;
      box-shadow: 0 10px 30px rgba(155, 240, 11, 0.18);
    }

    .add-button:active { transform: scale(0.96); }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      color: var(--muted);
      font-size: clamp(15px, 2.7vw, 20px);
    }

    .toolbar button {
      padding: 12px 16px;
      border-radius: 14px;
      background: transparent;
      color: var(--muted);
      font-weight: 700;
    }

    .toolbar button:disabled {
      opacity: 0.35;
      cursor: default;
    }

    .task-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .task {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      align-items: center;
      gap: 17px;
      min-height: clamp(86px, 14vw, 116px);
      padding: 18px 16px 18px 20px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: var(--panel);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.025);
      transition: opacity 160ms ease, transform 160ms ease, border-color 160ms ease;
    }

    .task:active { transform: scale(0.992); }

    .task.done {
      opacity: 0.58;
      background: rgba(19, 23, 32, 0.66);
    }

    .check {
      position: relative;
      width: clamp(42px, 8vw, 58px);
      height: clamp(42px, 8vw, 58px);
      flex: 0 0 auto;
      border: 2px solid #66707f;
      border-radius: 50%;
      background: transparent;
    }

    .task.done .check {
      border-color: var(--accent);
      background: var(--accent);
    }

    .task.done .check::after {
      content: "";
      position: absolute;
      left: 34%;
      top: 19%;
      width: 20%;
      height: 42%;
      border: solid #0f1309;
      border-width: 0 4px 4px 0;
      transform: rotate(45deg);
    }

    .task-text {
      min-width: 0;
      overflow-wrap: anywhere;
      font-size: clamp(21px, 4.2vw, 32px);
      font-weight: 650;
      line-height: 1.26;
      letter-spacing: -0.02em;
    }

    .task.done .task-text {
      color: #9ca3ad;
      text-decoration: line-through;
      text-decoration-thickness: 2px;
    }

    .delete {
      display: grid;
      place-items: center;
      width: clamp(48px, 9vw, 62px);
      height: clamp(48px, 9vw, 62px);
      border-radius: 18px;
      background: transparent;
      color: #77808f;
      font-size: clamp(25px, 5vw, 35px);
    }

    .delete:active {
      background: rgba(255, 107, 122, 0.12);
      color: var(--danger);
    }

    .empty {
      display: grid;
      place-items: center;
      min-height: 390px;
      padding: 44px 28px;
      border: 1px dashed rgba(255,255,255,0.14);
      border-radius: var(--radius);
      text-align: center;
      color: var(--muted);
    }

    .empty-icon {
      display: grid;
      place-items: center;
      width: 92px;
      height: 92px;
      margin: 0 auto 22px;
      border-radius: 30px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 48px;
    }

    .empty strong {
      display: block;
      margin-bottom: 9px;
      color: var(--text);
      font-size: clamp(26px, 5vw, 38px);
    }

    .empty p {
      max-width: 360px;
      margin: 0;
      font-size: clamp(17px, 3.2vw, 23px);
      line-height: 1.45;
    }

    .footer {
      margin-top: auto;
      padding-top: 22px;
      color: #5e6673;
      font-size: 13px;
      text-align: center;
    }

    @media (max-width: 430px) {
      .app { padding-inline: 14px; }
      .composer { gap: 8px; padding: 8px; border-radius: 22px; }
      #taskInput { padding-inline: 15px; }
      .task { gap: 13px; padding-left: 16px; }
      .toolbar { padding-inline: 4px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { scroll-behavior: auto !important; transition: none !important; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="header">
      <div>
        <p class="eyebrow">Y70 Dashboard</p>
        <h1>Tasks</h1>
        <p class="date" id="dateLabel"></p>
      </div>
      <div class="count-badge" aria-label="Open task count">
        <strong id="openCount">0</strong>
        <span>open</span>
      </div>
    </header>

    <form class="composer" id="taskForm" autocomplete="off">
      <input
        id="taskInput"
        name="task"
        type="text"
        maxlength="180"
        placeholder="Add a task…"
        aria-label="New task"
      />
      <button class="add-button" type="submit" aria-label="Add task">+</button>
    </form>

    <div class="toolbar">
      <span id="progressLabel">Nothing to do</span>
      <button id="clearCompleted" type="button" disabled>Clear done</button>
    </div>

    <section aria-live="polite">
      <ul class="task-list" id="taskList"></ul>
      <div class="empty" id="emptyState">
        <div>
          <div class="empty-icon" aria-hidden="true">✓</div>
          <strong>You're all clear.</strong>
          <p>Add a task above. Your list is saved on this device automatically.</p>
        </div>
      </div>
    </section>

    <footer class="footer">Saved locally in this browser · no account · no tracking</footer>
  </main>

  <script>
    (() => {
      "use strict";

      const STORAGE_KEY = "hyte-y70-tasks-v1";
      const taskForm = document.getElementById("taskForm");
      const taskInput = document.getElementById("taskInput");
      const taskList = document.getElementById("taskList");
      const emptyState = document.getElementById("emptyState");
      const openCount = document.getElementById("openCount");
      const progressLabel = document.getElementById("progressLabel");
      const clearCompleted = document.getElementById("clearCompleted");
      const dateLabel = document.getElementById("dateLabel");

      let tasks = loadTasks();

      function loadTasks() {
        try {
          const parsed = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
          return Array.isArray(parsed) ? parsed.filter(isValidTask) : [];
        } catch (error) {
          console.warn("Could not load saved tasks:", error);
          return [];
        }
      }

      function isValidTask(task) {
        return task && typeof task.id === "string" && typeof task.text === "string" && typeof task.done === "boolean";
      }

      function saveTasks() {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
        } catch (error) {
          console.warn("Could not save tasks:", error);
        }
      }

      function makeId() {
        if (window.crypto && typeof window.crypto.randomUUID === "function") {
          return window.crypto.randomUUID();
        }
        return `${Date.now()}-${Math.random().toString(16).slice(2)}`;
      }

      function addTask(text) {
        const cleanText = text.trim();
        if (!cleanText) return;

        tasks.unshift({
          id: makeId(),
          text: cleanText,
          done: false,
          createdAt: Date.now()
        });

        saveTasks();
        render();
      }

      function toggleTask(id) {
        tasks = tasks.map((task) => task.id === id ? { ...task, done: !task.done } : task);
        saveTasks();
        render();
      }

      function deleteTask(id) {
        tasks = tasks.filter((task) => task.id !== id);
        saveTasks();
        render();
      }

      function render() {
        taskList.replaceChildren();

        for (const task of tasks) {
          const item = document.createElement("li");
          item.className = `task${task.done ? " done" : ""}`;
          item.dataset.id = task.id;

          const checkButton = document.createElement("button");
          checkButton.type = "button";
          checkButton.className = "check";
          checkButton.setAttribute("aria-label", task.done ? `Mark ${task.text} as not done` : `Mark ${task.text} as done`);
          checkButton.setAttribute("aria-pressed", String(task.done));
          checkButton.addEventListener("click", () => toggleTask(task.id));

          const text = document.createElement("span");
          text.className = "task-text";
          text.textContent = task.text;

          const deleteButton = document.createElement("button");
          deleteButton.type = "button";
          deleteButton.className = "delete";
          deleteButton.textContent = "×";
          deleteButton.setAttribute("aria-label", `Delete ${task.text}`);
          deleteButton.addEventListener("click", () => deleteTask(task.id));

          item.append(checkButton, text, deleteButton);
          taskList.appendChild(item);
        }

        const done = tasks.filter((task) => task.done).length;
        const open = tasks.length - done;

        openCount.textContent = String(open);
        emptyState.hidden = tasks.length > 0;
        clearCompleted.disabled = done === 0;

        if (tasks.length === 0) {
          progressLabel.textContent = "Nothing to do";
        } else if (open === 0) {
          progressLabel.textContent = "All tasks complete";
        } else if (done === 0) {
          progressLabel.textContent = `${open} ${open === 1 ? "task" : "tasks"} to go`;
        } else {
          progressLabel.textContent = `${done} of ${tasks.length} complete`;
        }
      }

      taskForm.addEventListener("submit", (event) => {
        event.preventDefault();
        addTask(taskInput.value);
        taskInput.value = "";
        taskInput.focus();
      });

      clearCompleted.addEventListener("click", () => {
        tasks = tasks.filter((task) => !task.done);
        saveTasks();
        render();
      });

      dateLabel.textContent = new Intl.DateTimeFormat(undefined, {
        weekday: "long",
        day: "numeric",
        month: "long"
      }).format(new Date());

      render();
    })();
  </script>
</body>
</html>
